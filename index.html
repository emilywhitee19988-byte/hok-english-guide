<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOK English Guide - Full Roster</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #fff; padding: 20px; line-height: 1.5; }
    .container { max-width: 1400px; margin: 0 auto; }
    .view { display: none; }
    .view.active { display: block; }
    
    /* Header */
    .header { text-align: center; margin-bottom: 30px; padding: 30px; background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .controls { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; background: rgba(30, 41, 59, 0.6); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
    .search-box { flex: 1; min-width: 250px; }
    .search-box input { width: 100%; padding: 12px 15px; border: 2px solid #334155; border-radius: 10px; background: #000; color: white; outline: none; }
    
    .filter-btn { padding: 8px 16px; border: 1px solid #334155; border-radius: 8px; background: rgba(15, 23, 42, 0.8); color: #94a3b8; cursor: pointer; font-weight: 600; }
    .filter-btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }
    
    /* Grid */
    .tier-section { margin-bottom: 30px; background: rgba(30, 41, 59, 0.4); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
    .tier-header { padding: 12px 20px; font-size: 1.3rem; font-weight: 900; }
    .tier-s { background: #ef4444; } .tier-a { background: #f97316; } .tier-b { background: #facc15; color: #000; } .tier-c { background: #22c55e; }
    .tier-content { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 15px; }
    
    /* Card */
    .hero-card { background: #1e293b; border: 1.5px solid #334155; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
    .hero-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
    .hero-avatar { width: 75px; height: 75px; margin: 0 auto 10px; border-radius: 50%; border: 3px solid #3b82f6; overflow: hidden; }
    .hero-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .hero-title-txt { font-size: 0.9rem; font-weight: 800; color: #fff; margin-bottom: 2px; }
    .hero-id-txt { font-size: 0.7rem; color: #60a5fa; font-weight: bold; }

    /* Stats Page */
    .detail-card { background: #1e293b; padding: 40px; border-radius: 25px; border: 1px solid #3b82f6; max-width: 650px; margin: 0 auto; }
    .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
    .stat-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
    .stat-val { font-size: 1.8rem; font-weight: 900; color: #4ade80; display: block; }
    .back-btn { padding: 12px 24px; background: #3b82f6; border: none; color: white; border-radius: 10px; cursor: pointer; margin-bottom: 30px; font-weight: 700; }

    @media (max-width: 768px) { .tier-content { grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); } }
  </style>
</head>
<body>

  <div class="container">
    <div id="view-list" class="view active">
      <div class="header">
        <h1>🎮 HOK English Guide</h1>
        <p>115+ Hero Roster • Ninja Titles Corrected</p>
      </div>

      <div class="controls">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="🔍 Search (e.g. Fireninja, Evernight)..." oninput="runSearch()">
        </div>
        <div class="filters">
          <button class="filter-btn active" onclick="setRole('all', this)">All</button>
          <button class="filter-btn" onclick="setRole('Tank', this)">Tank</button>
          <button class="filter-btn" onclick="setRole('Fighter', this)">Fighter</button>
          <button class="filter-btn" onclick="setRole('Assassin', this)">Assassin</button>
          <button class="filter-btn" onclick="setRole('Mage', this)">Mage</button>
          <button class="filter-btn" onclick="setRole('Marksman', this)">Marksman</button>
          <button class="filter-btn" onclick="setRole('Support', this)">Support</button>
        </div>
      </div>

      <div id="tier-list-container"></div>
    </div>

    <div id="view-detail" class="view">
      <button class="back-btn" onclick="showView('list')">← BACK TO GUIDE</button>
      <div id="detail-container"></div>

  </div>

      { id: 'Zilong', tier: 'C', role: 'Assassin' }, { id: 'Ziya', tier: 'A', role: 'Mage' }
    ];

    let activeRole = 'all';
    let searchQuery = '';

    function showView(v, id = null) {
      document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
      document.getElementById('view-' + v).classList.add('active');
      if (v === 'herodetail' && id) renderDetail(id);
      window.scrollTo(0,0);
    }

    function renderDetail(id) {
      const h = HERO_DATA.find(x => x.id === id);
      const img = `hero_portraits/${encodeURIComponent(h.id)}${h.ext || '.png'}`;
      
      document.getElementById('detail-container').innerHTML = `
        <div class="detail-card">
          <img src="${img}" style="width:130px; height:130px; border-radius:50%; border:4px solid #3b82f6; margin:0 auto 20px; display:block;" onerror="this.src='https://ui-avatars.com/api/?name=${id}&background=1e293b&color=fff';">
          <h2 style="text-align:center; font-size:2.8rem; margin-bottom:5px;">${h.title || h.id}</h2>
          <p style="text-align:center; color:#60a5fa; font-weight:900; font-size:1.4rem; margin-bottom:25px;">${h.id.toUpperCase()}</p>
          
          <div class="stat-row">
            <div class="stat-box"><span class="stat-val" style="color:#ef4444">${h.tier}</span>TIER</div>
            <div class="stat-box"><span class="stat-val">52.3%</span>WIN RATE</div>
            <div class="stat-box"><span class="stat-val" style="color:#60a5fa">15.1%</span>PICK RATE</div>
            <div class="stat-box"><span class="stat-val" style="color:#facc15">ROLE</span>${h.role}</div>
          </div>
        </div>
      `;
    }

    function renderList() {
      const container = document.getElementById('tier-list-container');
      container.innerHTML = '';
      
      ['S', 'A', 'B', 'C'].forEach(t => {
        const heroes = HERO_DATA.filter(h => {
          const matchTier = h.tier === t;
          const matchRole = activeRole === 'all' || h.role === activeRole;
          const matchSearch = h.id.toLowerCase().includes(searchQuery) || (h.title && h.title.toLowerCase().includes(searchQuery));
          return matchTier && matchRole && matchSearch;
        });

        if (heroes.length > 0) {
          const sec = document.createElement('div');
          sec.className = 'tier-section';
          sec.innerHTML = `<div class="tier-header tier-${t.toLowerCase()}">${t}-TIER</div><div class="tier-content"></div>`;
          const content = sec.querySelector('.tier-content');
          
          content.innerHTML = heroes.map(h => `
            <div class="hero-card" onclick="showView('herodetail', '${h.id}')">
              <div class="hero-avatar">
                <img src="hero_portraits/${encodeURIComponent(h.id)}${h.ext || '.png'}" onerror="this.src='https://ui-avatars.com/api/?name=%20&background=1e293b&color=60a5fa';">
              </div>
              <div class="hero-title-txt">${h.title || h.id}</div>
              <div class="hero-id-txt">${h.id}</div>
            </div>
          `).join('');
          container.appendChild(sec);
        }
      });
    }

    function setRole(r, b) {
      activeRole = r;
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      b.classList.add('active');
      renderList();
    }

    function runSearch() {
      searchQuery = document.getElementById('search-input').value.toLowerCase();
      renderList();
    }

    window.onload = renderList;
  </script>
</body>
</html>
