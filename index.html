<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOK English Guide - S14 Full Roster</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #fff; padding: 20px; line-height: 1.5; }
    .container { max-width: 1400px; margin: 0 auto; }
    .view { display: none; }
    .view.active { display: block; }
    
    /* Header & Filters */
    .header { text-align: center; margin-bottom: 30px; padding: 30px; background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .controls { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; background: rgba(30, 41, 59, 0.6); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
    .search-box { flex: 1; min-width: 250px; }
    .search-box input { width: 100%; padding: 12px 15px; border: 2px solid #334155; border-radius: 10px; background: #000; color: white; outline: none; transition: 0.2s; }
    .search-box input:focus { border-color: #3b82f6; }
    
    .filter-btn { padding: 8px 16px; border: 1px solid #334155; border-radius: 8px; background: rgba(15, 23, 42, 0.8); color: #94a3b8; cursor: pointer; font-weight: 600; transition: 0.2s; }
    .filter-btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }
    
    /* Tier List Grid */
    .tier-section { margin-bottom: 30px; background: rgba(30, 41, 59, 0.4); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
    .tier-header { padding: 12px 20px; font-size: 1.3rem; font-weight: 900; letter-spacing: 1px; }
    .tier-s { background: #ef4444; } .tier-a { background: #f97316; } .tier-b { background: #facc15; color: #000; } .tier-c { background: #22c55e; }
    .tier-content { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
    
    /* Hero Card */
    .hero-card { background: #1e293b; border: 1.5px solid #334155; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
    .hero-card:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .hero-avatar { width: 75px; height: 75px; margin: 0 auto 10px; border-radius: 50%; border: 3px solid #3b82f6; overflow: hidden; }
    .hero-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .hero-title { font-size: 0.9rem; font-weight: 800; color: #fff; margin-bottom: 2px; }
    .hero-role-tag { font-size: 0.7rem; color: #60a5fa; font-weight: bold; text-transform: uppercase; }

    /* Detail View */
    .detail-card { background: #1e293b; padding: 40px; border-radius: 25px; border: 1px solid #3b82f6; max-width: 600px; margin: 0 auto; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
    .stat-item { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
    .stat-val { font-size: 1.8rem; font-weight: 900; color: #4ade80; display: block; }
    .back-btn { padding: 12px 24px; background: #3b82f6; border: none; color: white; border-radius: 10px; cursor: pointer; margin-bottom: 30px; font-weight: 700; transition: 0.2s; }
    .back-btn:hover { background: #2563eb; }

    @media (max-width: 768px) { .tier-content { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; } }
  </style>
</head>
<body>

    <div id="view-list" class="view active">
      <div class="header">
        <h1>🎮 HOK English Guide</h1>
        <p>Full 114+ Hero Database • S14 Global Meta</p>
      </div>

      <div class="controls">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="🔍 Search Hero Name (e.g. Daji, Kaizer)..." oninput="handleSearch()">
        </div>
        <div id="filter-container">
          <button class="filter-btn active" onclick="filterRole('all', this)">All</button>
          <button class="filter-btn" onclick="filterRole('Tank', this)">Tank</button>
          <button class="filter-btn" onclick="filterRole('Fighter', this)">Fighter</button>
          <button class="filter-btn" onclick="filterRole('Assassin', this)">Assassin</button>
          <button class="filter-btn" onclick="filterRole('Mage', this)">Mage</button>
          <button class="filter-btn" onclick="filterRole('Marksman', this)">Marksman</button>
          <button class="filter-btn" onclick="filterRole('Support', this)">Support</button>
        </div>
      </div>

      <div id="tier-list-root"></div>
    </div>

    <div id="view-detail" class="view">
      <button class="back-btn" onclick="showView('list')">← BACK TO LIST</button>

    let activeRole = 'all';
    let searchQuery = '';

    function showView(v, id = null) {
      document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
      document.getElementById('view-' + v).classList.add('active');
      if (v === 'herodetail' && id) renderDetail(id);
      window.scrollTo(0,0);
    }

    function renderDetail(id) {
      const h = HERO_LIST.find(x => x.id === id);
      const isJpg = (id === 'Chano' || id === 'Xuance');
      const imgPath = `hero_portraits/${encodeURIComponent(id)}${isJpg ? '.jpg' : '.png'}`;
      
      document.getElementById('detail-root').innerHTML = `
        <div class="detail-card">
          <img src="${imgPath}" style="width:120px; height:120px; border-radius:50%; margin:0 auto 20px; display:block; border:4px solid #3b82f6;" onerror="this.src='https://ui-avatars.com/api/?name=${id}&background=1e293b&color=fff';">
          <h2 style="text-align:center; font-size:2.5rem; margin-bottom:10px;">${id}</h2>
          <p style="text-align:center; color:#60a5fa; font-weight:bold; font-size:1.2rem; text-transform:uppercase;">${h.role}</p>
          
          <div class="stat-grid">
            <div class="stat-item"><span class="stat-val" style="color:#ef4444">${h.tier}</span>Tier</div>
            <div class="stat-item"><span class="stat-val">52.1%</span>Win Rate</div>
            <div class="stat-item"><span class="stat-val" style="color:#60a5fa">14.3%</span>Pick Rate</div>
            <div class="stat-item"><span class="stat-val" style="color:#fbbf24">8.2%</span>Ban Rate</div>
          </div>

          <div style="margin-top:30px; padding:20px; background:rgba(0,0,0,0.2); border-radius:15px; border:1px solid #334155;">
            <h3 style="color:#3b82f6; margin-bottom:10px;">Meta Analysis</h3>
            <p style="color:#94a3b8;">${id} is currently performing well in the S14 meta. Focus on objective control and team-fight positioning to maximize their impact.</p>
          </div>
        </div>
      `;
    }

    function renderList() {
      const root = document.getElementById('tier-list-root');
      root.innerHTML = '';
      
      ['S', 'A', 'B', 'C'].forEach(t => {
        const filtered = HERO_LIST.filter(h => {
          const matchTier = h.tier === t;
          const matchRole = activeRole === 'all' || h.role === activeRole;
          const matchSearch = h.id.toLowerCase().includes(searchQuery);
          return matchTier && matchRole && matchSearch;
        });

        if (filtered.length > 0) {
          const sec = document.createElement('div');
          sec.className = 'tier-section';
          sec.innerHTML = `<div class="tier-header tier-${t.toLowerCase()}">${t}-TIER</div><div class="tier-content"></div>`;
          const content = sec.querySelector('.tier-content');
          
          content.innerHTML = filtered.map(h => {
            const isJpg = (h.id === 'Chano' || h.id === 'Xuance');
            const imgPath = `hero_portraits/${encodeURIComponent(h.id)}${isJpg ? '.jpg' : '.png'}`;
            return `
              <div class="hero-card" onclick="showView('herodetail', '${h.id}')">
                <div class="hero-avatar">
                  <img src="${imgPath}" onerror="this.src='https://ui-avatars.com/api/?name=%20&background=1e293b&color=60a5fa';">
                </div>
                <div class="hero-title">${h.id}</div>
                <div class="hero-role-tag">${h.role}</div>
              </div>
            `;
          }).join('');
          root.appendChild(sec);
        }
      });
    }

    function filterRole(role, btn) {
      activeRole = role;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderList();
    }

    function handleSearch() {
      searchQuery = document.getElementById('search-input').value.toLowerCase();
      renderList();
    }

    window.onload = renderList;
  </script>
</body>
</html>
