<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOK English Guide - 114+ Hero List</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #e2e8f0; min-height: 100vh; padding: 20px; line-height: 1.3; }
    .container { max-width: 1400px; margin: 0 auto; }
    .view { display: none; }
    .view.active { display: block; }
    
    /* Header */
    .header { text-align: center; margin-bottom: 30px; padding: 25px; background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .header h1 { font-size: 2rem; margin-bottom: 5px; }
    
    /* Search & Filter */
    .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; background: rgba(30, 41, 59, 0.6); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
    .search-box { flex: 1; min-width: 200px; }
    .search-box input { width: 100%; padding: 10px 15px; border: 2px solid #334155; border-radius: 8px; background: rgba(15, 23, 42, 0.8); color: white; outline: none; }
    .filter-btn { padding: 8px 12px; border: 1px solid #334155; border-radius: 8px; background: rgba(15, 23, 42, 0.8); color: #94a3b8; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
    .filter-btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }
    
    /* Tier Layout */
    .tier-section { margin-bottom: 20px; background: rgba(30, 41, 59, 0.4); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
    .tier-header { padding: 8px 20px; font-size: 1.1rem; font-weight: 900; letter-spacing: 1px; }
    .tier-s { background: #ef4444; } .tier-a { background: #f97316; } .tier-b { background: #facc15; color: #0f172a; } .tier-c { background: #22c55e; }
    .tier-content { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 12px; }
    
    /* Hero Card */
    .hero-card { background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%); border: 1.5px solid #334155; border-radius: 12px; padding: 12px; cursor: pointer; transition: 0.2s; text-align: center; }
    .hero-card:hover { transform: translateY(-3px); border-color: #3b82f6; }
    .hero-avatar { width: 70px; height: 70px; margin: 0 auto 8px; border-radius: 50%; border: 2px solid #475569; overflow: hidden; background: #000; }
    .hero-avatar img { width: 100%; height: 100%; object-fit: cover; }
    
    /* THE CLEAN LOOK */
    .hero-title-main { 
      font-size: 0.95rem; 
      font-weight: 800; 
      color: #fff; 
      margin-bottom: 2px; 
      word-wrap: break-word; 
    }
    .hero-name-blue { 
      font-size: 11px; 
      color: #60a5fa; /* Blue Hero Name */
      font-weight: 600;
      margin-bottom: 8px;
      display: block;
    }
    .hero-role-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; background: #334155; }
    .role-tank { background: #1e40af; } .role-fighter { background: #dc2626; } .role-assassin { background: #7c3aed; } .role-mage { background: #2563eb; } .role-marksman { background: #ea580c; } .role-support { background: #059669; }

    /* Mobile */
    @media (max-width: 768px) {
      .tier-content { grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 8px; }
      .hero-avatar { width: 55px; height: 55px; }
      .hero-title-main { font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="view-tierlist" class="view active">
      <div class="header">
        <h1>🎮 HOK English Guide</h1>
        <p>114+ Hero Roster • S14 Global Meta</p>
      </div>

      <div class="controls">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="🔍 Search Title or Name..." oninput="filterHeroes()">
        </div>
        <div class="filter-buttons">
          <button class="filter-btn active" data-role="all" onclick="filterByRole('all')">All Roles</button>
          <button class="filter-btn" data-role="Tank" onclick="filterByRole('Tank')">Tank</button>
          <button class="filter-btn" data-role="Fighter" onclick="filterByRole('Fighter')">Fighter</button>
          <button class="filter-btn" data-role="Assassin" onclick="filterByRole('Assassin')">Assassin</button>
          <button class="filter-btn" data-role="Mage" onclick="filterByRole('Mage')">Mage</button>
          <button class="filter-btn" data-role="Marksman" onclick="filterByRole('Marksman')">Marksman</button>
          <button class="filter-btn" data-role="Support" onclick="filterByRole('Support')">Support</button>
        </div>
      </div>

      <div id="tier-container"></div>
    </div>

    <div id="view-herodetail" class="view">
      <button onclick="showView('tierlist')" style="padding:10px; margin-bottom:20px; cursor:pointer;">← Back</button>
      <div id="hero-detail-content"></div>
    </div>
  </div>

      'zhouyu': { id: 'zhouyu', nameEn: 'Inferno', nameReal: 'Zhou Yu', role: 'Mage', tier: 'C' },
      'ladyzhen': { id: 'ladyzhen', nameEn: 'Cascada', nameReal: 'Lady Zhen', role: 'Mage', tier: 'A' },
      'liang': { id: 'liang', nameEn: 'Grand Strategist', nameReal: 'Liang', role: 'Mage', tier: 'S' },
      'yuhuan': { id: 'yuhuan', nameEn: 'Fatal Lyrist', nameReal: 'Yuhuan', role: 'Mage', tier: 'B' },

      // TANKS
      'kaizer': { id: 'kaizer', nameEn: 'Demonplate', nameReal: 'Kaizer', role: 'Tank', tier: 'S' },
      'donghuang': { id: 'donghuang', nameEn: 'Harbinger', nameReal: 'Donghuang', role: 'Tank', tier: 'S' },
      'ata': { id: 'ata', nameEn: 'White Anchor', nameReal: 'Ata', role: 'Tank', tier: 'B' },
      'baiqi': { id: 'baiqi', nameEn: 'Blood General', nameReal: 'Bai Qi', role: 'Tank', tier: 'A' },
      'dun': { id: 'dun', nameEn: 'Belligerence', nameReal: 'Dun', role: 'Tank', tier: 'A' },
      'lianpo': { id: 'lianpo', nameEn: 'Earthshaker', nameReal: 'Lian Po', role: 'Tank', tier: 'B' },
      'liushan': { id: 'liushan', nameEn: 'Mecha Brat', nameReal: 'Liu Shan', role: 'Tank', tier: 'B' },
      'mengtian': { id: 'mengtian', nameEn: 'Meng Tian', nameReal: 'Meng Tian', role: 'Tank', tier: 'B' },
      'sunce': { id: 'sunce', nameEn: 'Seafarer', nameReal: 'Sun Ce', role: 'Tank', tier: 'A' },

      'zhuangzhou': { id: 'zhuangzhou', nameEn: 'Dreamwanderer', nameReal: 'Zhuangzi', role: 'Tank', tier: 'B' },

      // FIGHTERS
      'allain': { id: 'allain', nameEn: 'Forgotten Blade', nameReal: 'Allain', role: 'Fighter', tier: 'A' },
      'arthur': { id: 'arthur', nameEn: 'Paladin', nameReal: 'Arthur', role: 'Fighter', tier: 'B' },

      'lubu': { id: 'lubu', nameEn: 'Unrivaled Warrior', nameReal: 'Lu Bu', role: 'Fighter', tier: 'B' },
      'mulan': { id: 'mulan', nameEn: 'Ironbloom', nameReal: 'Mulan', role: 'Fighter', tier: 'B' },
      'musashi': { id: 'musashi', nameEn: 'Swordmaster', nameReal: 'Musashi', role: 'Fighter', tier: 'B' },
      'nezha': { id: 'nezha', nameEn: 'Wild Spark', nameReal: 'Nezha', role: 'Fighter', tier: 'C' },
      'pangu': { id: 'pangu', nameEn: 'World Creator', nameReal: 'Pangu', role: 'Fighter', tier: 'A' },

      // ASSASSINS
      'arke': { id: 'arke', nameEn: 'Shadowstalker', nameReal: 'Arke', role: 'Assassin', tier: 'S' },
      'butterfly': { id: 'butterfly', nameEn: 'Death\'s Whisper', nameReal: 'Butterfly', role: 'Assassin', tier: 'B' },
      'gaochanggong': { id: 'gaochanggong', nameEn: 'Shadowblade', nameReal: 'Lanling', role: 'Assassin', tier: 'S' },

      'lam': { id: 'lam', nameEn: 'Stealthfin', nameReal: 'Lam', role: 'Assassin', tier: 'S' },
      'libai': { id: 'libai', nameEn: 'Lyricist', nameReal: 'Li Bai', role: 'Assassin', tier: 'B' },
      'luna': { id: 'luna', nameEn: 'Moonblade', nameReal: 'Luna', role: 'Assassin', tier: 'A' },
      'wukong': { id: 'wukong', nameEn: 'Monkey King', nameReal: 'Wukong', role: 'Assassin', tier: 'B' },

      // MARKSMEN
      'alessio': { id: 'alessio', nameEn: 'Red Hawk', nameReal: 'Alessio', role: 'Marksman', tier: 'C' },
      'erin': { id: 'erin', nameEn: 'Laurel Princess', nameReal: 'Erin', role: 'Marksman', tier: 'A' },

      'houyi': { id: 'houyi', nameEn: 'Solarus', nameReal: 'Hou Yi', role: 'Marksman', tier: 'S' },
      'ladysun': { id: 'ladysun', nameEn: 'Cannon Belle', nameReal: 'Lady Sun', role: 'Marksman', tier: 'B' },
      'loong': { id: 'loong', nameEn: 'Loong', nameReal: 'Ao Yin', role: 'Marksman', tier: 'S' },
      'marcopolo': { id: 'marcopolo', nameEn: 'Gunslinger', nameReal: 'Marco Polo', role: 'Marksman', tier: 'S' },
      'shouyue': { id: 'shouyue', nameEn: 'Longshot', nameReal: 'Shouyue', role: 'Marksman', tier: 'B' },

      // SUPPORTS
      'caiyan': { id: 'caiyan', nameEn: 'Healing Tone', nameReal: 'Cai Yan', role: 'Support', tier: 'S' },
      'daqiao': { id: 'daqiao', nameEn: 'Lanternlight', nameReal: 'Da Qiao', role: 'Support', tier: 'A' },
      'dolia': { id: 'dolia', nameEn: 'Seasinger', nameReal: 'Dolia', role: 'Support', tier: 'S' },
      'dyadia': { id: 'dyadia', nameEn: 'Bondweaver', nameReal: 'Dyadia', role: 'Support', tier: 'A' },
      'guiguzi': { id: 'guiguzi', nameEn: 'Animist', nameReal: 'Guiguzi', role: 'Support', tier: 'B' },
      'ming': { id: 'ming', nameEn: 'Star Teller', nameReal: 'Ming', role: 'Support', tier: 'C' },
      'sakeer': { id: 'sakeer', nameEn: 'Brushstrider', nameReal: 'Sakeer', role: 'Support', tier: 'B' },
      'taiyi': { id: 'taiyi', nameEn: 'Master Taiyi', nameReal: 'Taiyi', role: 'Support', tier: 'A' },
      'yaria': { id: 'yaria', nameEn: 'Deerie', nameReal: 'Yaria', role: 'Support', tier: 'A' }
    };

    // Auto-setup images and dummy stats
    Object.keys(HEROES).forEach(key => {
      let h = HEROES[key];
      h.imageUrl = `hero_portraits/${h.id}.png`; 
      h.winRate = (48 + Math.random() * 6).toFixed(1);
      h.pickRate = (5 + Math.random() * 20).toFixed(1);
      h.fallbackUrl = `https://ui-avatars.com/api/?name=%20&background=1e293b&color=60a5fa`;
    });

    let currentFilter = 'all';
    let currentSearch = '';

    function init() { renderAllTiers(); }

    function showView(viewName, heroId = null) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + viewName).classList.add('active');
      if (viewName === 'herodetail' && heroId) renderHeroDetail(heroId);
    }

    function renderAllTiers() {
      const container = document.getElementById('tier-container');
      container.innerHTML = '';
      ['S', 'A', 'B', 'C'].forEach(tier => {
        const section = document.createElement('div');
        section.className = 'tier-section';
        section.innerHTML = `<div class="tier-header tier-${tier.toLowerCase()}"><span>${tier}-TIER</span></div><div class="tier-content" id="tier-${tier.toLowerCase()}-content"></div>`;
        container.appendChild(section);
        renderTier(tier);
      });
    }

    function renderTier(tier) {
      const container = document.getElementById(`tier-${tier.toLowerCase()}-content`);
      const heroes = Object.values(HEROES).filter(h => {
        const matchRole = currentFilter === 'all' || h.role === currentFilter;
        const matchSearch = h.nameEn.toLowerCase().includes(currentSearch) || h.nameReal.toLowerCase().includes(currentSearch);
        return h.tier === tier && matchRole && matchSearch;
      });
      if (heroes.length === 0) { container.innerHTML = '<p style="color:#64748b; font-size:0.7rem;">None</p>'; return; }
      
      container.innerHTML = heroes.map(h => `
        <div class="hero-card" onclick="showView('herodetail', '${h.id}')">
          <div class="hero-avatar">
            <img src="${h.imageUrl}" onerror="this.onerror=null; this.src='${h.fallbackUrl}';">
          </div>
          <div class="hero-title-main">${h.nameEn}</div>
          <div class="hero-name-blue">${h.nameReal}</div>
          <div class="hero-role-badge role-${h.role.toLowerCase()}">${h.role}</div>
        </div>
      `).join('');
    }

    function filterByRole(role) {
      currentFilter = role;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      renderAllTiers();
    }

    function filterHeroes() {
      currentSearch = document.getElementById('search-input').value.toLowerCase();
      renderAllTiers();
    }

    function renderHeroDetail(id) {
      const h = HEROES[id];
      document.getElementById('hero-detail-content').innerHTML = `
        <div class="header">
          <div style="font-size:2rem; font-weight:800;">${h.nameEn}</div>
          <div style="color:#60a5fa; font-size:1.2rem; font-weight:bold;">${h.nameReal}</div>
          <div style="margin-top:10px;">Role: ${h.role} | Tier: ${h.tier}</div>
        </div>
        <div style="padding:20px; text-align:center;">
           <img src="${h.imageUrl}" style="width:120px; height:120px; border-radius:50%; border:4px solid #3b82f6;" onerror="this.src='${h.fallbackUrl}';">
           <div style="margin-top:20px;">Win Rate: ${h.winRate}% | Pick Rate: ${h.pickRate}%</div>
        </div>
      `;
    }

    window.onload = init;
  </script>
</body>
</html>
