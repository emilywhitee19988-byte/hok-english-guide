<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honor of Kings | Strategy Database</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Kanit:wght@600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3b82f6; --bg: #020617; --card-bg: #111827;
      --gold: #fbbf24; --text: #f8fafc; --text-dim: #94a3b8;
      --s-tier: #ef4444; --a-tier: #f97316; --b-tier: #facc15; --c-tier: #94a3b8;
      --wr-good: #10b981; --wr-bad: #ef4444;
      --ally-team: #3b82f6; --enemy-team: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: env(safe-area-inset-top) 15px 40px; line-height: 1.6; }
    .container { max-width: 1400px; margin: 0 auto; }
    
    .view { display: none; opacity: 0; }
    .view.active { display: block; opacity: 1; transition: opacity 0.3s ease; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .site-nav { display: flex; justify-content: center; gap: 30px; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
    .site-nav-btn { background: transparent; border: none; color: var(--text-dim); font-family: 'Kanit'; font-size: 1.2rem; cursor: pointer; text-transform: uppercase; transition: 0.3s; font-weight: 800; letter-spacing: 1px;}
    .site-nav-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

    .header { text-align: center; margin-bottom: 25px; padding: 40px 20px; background: radial-gradient(circle at top, #1e3a8a 0%, #020617 100%); border-radius: 32px; border: 1px solid rgba(255,255,255,0.05); }
    .header h1 { font-family: 'Kanit'; font-size: clamp(2rem, 5vw, 3.5rem); text-transform: uppercase; background: linear-gradient(to bottom, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }

    .nav-bar { position: sticky; top: 10px; z-index: 100; display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; background: rgba(15, 23, 42, 0.95); padding: 12px; border-radius: 20px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
    .search-box { flex: 1; min-width: 250px; }
    .search-box input { width: 100%; padding: 14px; border: 1px solid #334155; border-radius: 14px; background: #000; color: white; outline: none; }
    .filter-btn { padding: 10px 18px; border: 1px solid #334155; border-radius: 10px; background: transparent; color: var(--text-dim); cursor: pointer; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; transition: 0.2s; }
    .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    .tier-wrapper { margin-bottom: 40px; }
    .tier-label { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; font-family: 'Kanit'; font-size: 1.1rem; font-weight: 800; }
    .tier-line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
    .tier-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
    
    .hero-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; text-align: center; cursor: pointer; transition: 0.4s; position: relative; }
    .hero-card:hover { transform: translateY(-8px); border-color: var(--primary); }
    .hero-avatar { width: 80px; height: 80px; margin: 0 auto 12px; border-radius: 50%; border: 2px solid var(--primary); overflow: hidden; background: #000; }
    .hero-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .hero-fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #1e293b; color: var(--primary); font-family: 'Kanit'; font-size: 2.2rem; font-weight: 900; }
    
    .hero-flavor { font-size: 0.85rem; font-weight: 800; color: #fff; display: block; margin-bottom: 2px; line-height: 1.1; }
    .hero-name-label { font-size: 0.6rem; color: var(--primary); font-weight: 700; text-transform: uppercase; margin-bottom: 8px; display: block; }
    .card-stats { display: flex; justify-content: center; gap: 10px; font-size: 0.65rem; font-weight: 800; }

    /* DETAIL VIEW */
    .dashboard { background: var(--card-bg); padding: 40px; border-radius: 32px; border: 1px solid rgba(255,255,255,0.1); max-width: 900px; margin: 0 auto; }
    .section-title { color: var(--primary); font-size: 0.85rem; font-weight: 900; margin: 35px 0 15px; border-bottom: 1px solid #334155; padding-bottom: 8px; text-transform: uppercase; letter-spacing: 2px; }
    .analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .stat-box { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; text-align: center; }
    .stat-box.draft-box { grid-column: 1 / -1; text-align: left; border-left: 4px solid var(--primary); }
    .stat-value { font-family: 'Kanit'; font-size: 2rem; color: #fff; line-height: 1; margin-bottom: 5px; }
    .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
    .sprite-banner { background: linear-gradient(135deg, #1e40af 0%, #020617 100%); padding: 25px; border-radius: 24px; border: 1px solid var(--primary); display: flex; align-items: center; gap: 20px; }
    .sprite-icon-box { width: 60px; height: 60px; background: #000; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; border: 2px solid var(--gold); }
    .back-btn { padding: 12px 25px; background: transparent; border: 1px solid var(--primary); color: var(--primary); border-radius: 12px; cursor: pointer; margin-bottom: 30px; font-weight: 800; text-transform: uppercase; font-size: 0.75rem; transition: 0.3s;}
    .back-btn:hover { background: var(--primary); color: white; }

    /* DRAFT SIMULATOR */
    .role-selector-bar { background: rgba(15, 23, 42, 0.6); padding: 15px 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap;}
    .role-btn { padding: 8px 18px; border: 1px solid #334155; border-radius: 12px; background: transparent; color: var(--text-dim); cursor: pointer; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; transition: 0.2s;}
    .role-btn.active { background: var(--primary); color: white; }

    .draft-layout { display: flex; gap: 20px; align-items: flex-start; }
    .team-panel { width: 340px; flex-shrink: 0; background: var(--card-bg); border-radius: 24px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
    .team-header { font-family: 'Kanit'; font-size: 1.8rem; text-transform: uppercase; text-align: center; margin-bottom: 20px; border-bottom: 2px solid; padding-bottom: 10px; }
    .ally-team .team-header { color: var(--ally-team); border-color: var(--ally-team); }
    .enemy-team .team-header { color: var(--enemy-team); border-color: var(--enemy-team); }

    .draft-slot { width: 100%; height: 75px; background: rgba(0,0,0,0.6); border: 2px dashed #334155; border-radius: 14px; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; padding: 5px 15px; gap: 15px; position: relative; transition: 0.2s; }
    .draft-slot.active { border-color: var(--gold); background: rgba(251, 191, 36, 0.1); }
    .my-role-badge { position: absolute; top: -8px; left: -8px; background: var(--gold); color: #000; font-size: 0.65rem; font-weight: 900; padding: 3px 8px; border-radius: 8px; z-index: 5;}
    .slot-role-label { position: absolute; right: 12px; bottom: 8px; font-size: 0.55rem; color: #475569; font-weight: 900; text-transform: uppercase; }

    .pool-panel { flex-grow: 1; background: var(--card-bg); border-radius: 24px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); }
    .pool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 15px; max-height: 800px; overflow-y: auto; }
    .pool-hero { cursor: pointer; text-align: center; opacity: 1; transition: 0.2s; position: relative; }
    .pool-hero.drafted { opacity: 0.2; pointer-events: none; filter: grayscale(100%); }
    .pool-hero.suggested { transform: scale(1.1); z-index: 10; }
    .pool-hero.suggested .pool-hero-img { border: 3px solid var(--gold); box-shadow: 0 0 15px rgba(251, 191, 36, 0.8); }
    .pool-hero.suggested::before { content: '★ COUNTER'; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; font-size: 0.5rem; font-weight: 900; padding: 3px 6px; border-radius: 6px; z-index: 10; white-space: nowrap; }
    .pool-hero-img { width: 70px; height: 70px; border-radius: 50%; margin: 0 auto 8px; border: 2px solid transparent; background: #000; overflow: hidden; }
    .pool-hero-title { font-size: 0.65rem; font-weight: 800; color: #fff; line-height: 1.1; margin-bottom: 2px; }

    .analyzer-box { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.4); border-radius: 14px; border: 1px solid rgba(255,255,255,0.05); }
    .item-card { background: rgba(15, 23, 42, 0.8); border-left: 4px solid var(--gold); border-radius: 0 12px 12px 0; padding: 12px; margin-top: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .item-priority { font-size: 0.6rem; font-weight: 900; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
    .item-name { color: #fff; font-size: 0.75rem; font-weight: 900; text-transform: uppercase; }
    .item-desc { color: var(--text-dim); font-size: 0.65rem; margin-top: 4px; line-height: 1.3; }

    .matchup-banner { display: flex; background: rgba(15, 23, 42, 0.6); padding: 20px 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; gap: 40px; flex-wrap: wrap;}
    
    /* SCOREBOARD RATING CSS */
    .spike-row { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
    .spike-score-text { font-family: 'Kanit'; font-weight: 900; font-size: 1.1rem; width: 40px; text-align: center; }
    .spike-score-ally { color: var(--ally-team); }
    .spike-score-enemy { color: var(--enemy-team); }
    .spike-label { width: 50px; text-align: center; font-size: 0.65rem; font-weight: 900; color: var(--text-dim); text-transform: uppercase; }
    .spike-bar-wrap { flex: 1; background: rgba(255,255,255,0.05); height: 10px; border-radius: 5px; overflow: hidden; }
    .spike-bar-ally-fill { height: 100%; background: var(--ally-team); transition: width 0.4s; float: right; border-radius: 5px 0 0 5px; }
    .spike-bar-enemy-fill { height: 100%; background: var(--enemy-team); transition: width 0.4s; border-radius: 0 5px 5px 0; }

    .reset-draft-btn { padding: 10px 20px; background: rgba(239, 68, 68, 0.1); border: 1px solid var(--s-tier); color: var(--s-tier); border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; transition: 0.2s;}
    .reset-draft-btn:hover { background: var(--s-tier); color: white; }
    .copy-draft-btn { padding: 10px 20px; background: rgba(59, 130, 246, 0.1); border: 1px solid var(--primary); color: var(--primary); border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; transition: 0.2s;}
    .copy-draft-btn:hover { background: var(--primary); color: #fff; }

    /* --- MOBILE RESPONSIVENESS --- */
    @media (max-width: 1024px) {
      .draft-layout { flex-direction: column; align-items: stretch; }
      .team-panel { width: 100%; margin-bottom: 20px; }
      .matchup-banner { flex-direction: column; gap: 20px; }
      .matchup-banner > div { border-left: none !important; padding-left: 0 !important; }
      .pool-grid { grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); max-height: 400px; }
      .pool-hero-img { width: 55px; height: 55px; }
      .draft-controls-wrap { flex-direction: column; align-items: flex-start; gap: 15px;}
    }
  </style>
</head>
<body>

  <div class="site-nav">
    <button id="nav-list" class="site-nav-btn active" onclick="switchMainTab('list')">Meta Tier List</button>
    <button id="nav-draft" class="site-nav-btn" onclick="switchMainTab('draft')">Ranked Team Builder</button>
  </div>

  <div class="container">
    <div id="shared-navbar" class="nav-bar">
      <div class="search-box"><input type="text" id="search-input" placeholder="Search by title or name..." oninput="handleSearch()"></div>
      <div id="role-filters" style="display:flex; gap:6px; flex-wrap:wrap;">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" data-filter="Clash Lane" onclick="setFilter('Clash Lane', this)">Clash Lane</button>
        <button class="filter-btn" data-filter="Jungle" onclick="setFilter('Jungle', this)">Jungle</button>
        <button class="filter-btn" data-filter="Mid Lane" onclick="setFilter('Mid Lane', this)">Mid Lane</button>
        <button class="filter-btn" data-filter="Farm Lane" onclick="setFilter('Farm Lane', this)">Farm Lane</button>
        <button class="filter-btn" data-filter="Roam" onclick="setFilter('Roam', this)">Roam</button>
      </div>
    </div>

    <div id="view-list" class="view active">
      <div class="header">
        <h1>Honor of Kings</h1>
        <p>Global Strategic Repository</p>
      </div>
      <div id="tier-list-root"></div>
    </div>

    <div id="view-herodetail" class="view">
      <button class="back-btn" onclick="switchMainTab('list')">← Back to Tier List</button>
      <div id="detail-root"></div>
    </div>

    <div id="view-draft" class="view">
      <div class="draft-controls-wrap" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="font-family:'Kanit'; font-size:1.8rem;">Ranked Team Builder</h2>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button id="export-btn" class="copy-draft-btn" onclick="exportDraft()">📋 Copy Draft</button>
          <button class="copy-draft-btn" style="border-color:var(--gold); color:var(--gold); background:rgba(251,191,36,0.1);" onclick="suggestCounters()">💡 Suggest Pick</button>
          <button class="reset-draft-btn" onclick="resetDraft()">Clear Board</button>
        </div>
      </div>

      <div class="role-selector-bar">
        <span style="font-weight:900; font-size:0.8rem; color:var(--text-dim);">I AM PLAYING:</span>
        <button class="role-btn active" onclick="setMyDraftRole('Clash Lane', this)">Clash</button>
        <button class="role-btn" onclick="setMyDraftRole('Jungle', this)">Jungle</button>
        <button class="role-btn" onclick="setMyDraftRole('Mid Lane', this)">Mid</button>
        <button class="role-btn" onclick="setMyDraftRole('Farm Lane', this)">Farm</button>
        <button class="role-btn" onclick="setMyDraftRole('Roam', this)">Roam</button>
      </div>

      <div class="matchup-banner">
        <div style="flex:1; min-width: 250px;">
          <div style="font-size:0.7rem; font-weight:900; color:var(--text-dim); margin-bottom:15px;">POWER SPIKE RATINGS (OUT OF 10)</div>
          
          <div class="spike-row">
            <div id="num-early-ally" class="spike-score-text spike-score-ally">0.0</div>
            <div class="spike-bar-wrap"><div id="bar-early-ally" class="spike-bar-ally-fill" style="width:0%;"></div></div>
            <div class="spike-label">EARLY</div>
            <div class="spike-bar-wrap"><div id="bar-early-enemy" class="spike-bar-enemy-fill" style="width:0%;"></div></div>
            <div id="num-early-enemy" class="spike-score-text spike-score-enemy">0.0</div>
          </div>
          
          <div class="spike-row">
            <div id="num-mid-ally" class="spike-score-text spike-score-ally">0.0</div>
            <div class="spike-bar-wrap"><div id="bar-mid-ally" class="spike-bar-ally-fill" style="width:0%;"></div></div>
            <div class="spike-label">MID</div>
            <div class="spike-bar-wrap"><div id="bar-mid-enemy" class="spike-bar-enemy-fill" style="width:0%;"></div></div>
            <div id="num-mid-enemy" class="spike-score-text spike-score-enemy">0.0</div>
          </div>

          <div class="spike-row">
            <div id="num-late-ally" class="spike-score-text spike-score-ally">0.0</div>
            <div class="spike-bar-wrap"><div id="bar-late-ally" class="spike-bar-ally-fill" style="width:0%;"></div></div>
            <div class="spike-label">LATE</div>
            <div class="spike-bar-wrap"><div id="bar-late-enemy" class="spike-bar-enemy-fill" style="width:0%;"></div></div>
            <div id="num-late-enemy" class="spike-score-text spike-score-enemy">0.0</div>
          </div>
        </div>
        <div style="flex:1; border-left:1px solid rgba(255,255,255,0.1); padding-left:25px; min-width: 250px;">
           <div style="font-size:0.7rem; font-weight:900; color:var(--text-dim);">TACTICAL COACH</div>
           <div id="draft-advice-text" style="font-size:0.85rem; font-weight:700; margin-top:5px; line-height:1.4;">Draft teams to generate tactical advice...</div>
        </div>
      </div>

      <div class="draft-layout">
        <div class="team-panel ally-team">
          <div class="team-header">Ally Team</div>
          <div id="ally-picks-container"></div>
          <div class="slot-group-title">Bans (3)</div>
          <div id="ally-bans-container" style="display:flex; justify-content: space-around; margin-bottom:20px;"></div>
          
          <div class="analyzer-box">
            <div style="font-size:0.7rem; font-weight:900; margin-bottom:10px; color:var(--text-dim);">ADAPTIVE ITEM COUNTERS</div>
            <div id="item-response-output"></div>
          </div>
        </div>
        <div class="pool-panel">
          <div id="draft-pool-root" class="pool-grid"></div>
        </div>
        <div class="team-panel enemy-team">
          <div class="team-header">Enemy Team</div>
          <div id="enemy-picks-container"></div>
          <div class="slot-group-title">Bans (3)</div>
          <div id="enemy-bans-container" style="display:flex; justify-content: space-around;"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SPRITES = {
      'Bigly': { icon: '🔥', bonus: '10% Damage Reduction', cost: '10% Movement Speed', desc: 'Superior frontline fortification.' },
      'Coolio': { icon: '❄️', bonus: 'Enhanced Spell Cooldowns', cost: '10% Max HP', desc: 'Tactical ability rotation frequency.' },
      'Runsie': { icon: '🏃', bonus: '100% Movement Speed', cost: '10% Damage Reduction', desc: 'Extreme mobility and kite potential.' }
    };

    function getHeroScores(s) {
      if(!s) return {e:5, m:5, l:5};
      if(s.includes('Early-Game')) return {e:9, m:5, l:3};
      if(s.includes('Early-Mid')) return {e:8, m:7, l:4};
      if(s.includes('Level 4+')) return {e:6, m:8, l:7};
      if(s.includes('Level 4')) return {e:7, m:8, l:5};
      if(s.includes('Mid-Late')) return {e:4, m:8, l:8};
      if(s.includes('Mid-Game')) return {e:5, m:9, l:6};
      if(s.includes('Late-Game')) return {e:3, m:5, l:9};
      return {e:5, m:5, l:5};

    let draftState = {
      myRole: 'Clash Lane',
      ally: { 'Clash Lane': null, 'Jungle': null, 'Mid Lane': null, 'Farm Lane': null, 'Roam': null },
      enemy: { 'Clash Lane': null, 'Jungle': null, 'Mid Lane': null, 'Farm Lane': null, 'Roam': null },
      allyBans: [null, null, null], enemyBans: [null, null, null]
    };

    function saveDraftState() {
      localStorage.setItem('hok_draft_state', JSON.stringify(draftState));
    }

    function loadDraftState() {
      const saved = localStorage.getItem('hok_draft_state');
      if (saved) {
        try { 
            draftState = JSON.parse(saved); 
            if(draftState.allyBans.length === 2) draftState.allyBans.push(null);
            if(draftState.enemyBans.length === 2) draftState.enemyBans.push(null);
        } catch(e) {}
      }
    }

    function switchMainTab(tabId) {
      activeTab = tabId;
      document.querySelectorAll('.site-nav-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('nav-' + tabId).classList.add('active');
      const nav = document.getElementById('shared-navbar');
      if(tabId === 'list') {
        document.getElementById('view-list').insertBefore(nav, document.getElementById('tier-list-root'));
        setFilter('all', document.querySelector('.filter-btn[onclick*="all"]'));
      } else {
        document.getElementById('view-draft').insertBefore(nav, document.querySelector('.matchup-banner'));
        document.querySelectorAll('.role-btn').forEach(b => {
            b.classList.remove('active');
            if (b.innerText.toLowerCase().includes(draftState.myRole.split(' ')[0].toLowerCase())) b.classList.add('active');
        });
      }
      showView(tabId);
      if(activeTab === 'list') renderList(); else renderDraftBoard();
    }

    function showView(v, id = null) {
      document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
      document.getElementById('view-' + v).classList.add('active');
      if(v === 'herodetail' && id) renderDetail(id);
      window.scrollTo(0,0);
    }

    function loadPortrait(el, id) {
      const paths = [`hero_portraits/${id}.png`, `hero_portraits/${id.toLowerCase()}.png` ];
      let i = 0;
      el.onerror = () => { if(i < paths.length) el.src = paths[i++]; else el.outerHTML = `<div class="hero-fallback">${id[0]}</div>`; };
      el.src = paths[i++];
    }

    function renderList() {
      const root = document.getElementById('tier-list-root'); root.innerHTML = '';
      ['S', 'A', 'B', 'C'].forEach(t => {
        const filtered = HEROES.filter(h => h.tier === t && (currentFilter === 'all' || h.lane.includes(currentFilter)) && (h.id.toLowerCase().includes(currentSearch) || h.title.toLowerCase().includes(currentSearch)))
                               .sort((a, b) => parseFloat(b.wr) - parseFloat(a.wr));
                               
        if(filtered.length > 0) {
          const wrap = document.createElement('div'); wrap.className = 'tier-wrapper';
          wrap.innerHTML = `<div class="tier-label"><span style="color:var(--${t.toLowerCase()}-tier, #94a3b8)">${t}-TIER</span><div class="tier-line"></div></div><div class="tier-grid"></div>`;
          const grid = wrap.querySelector('.tier-grid');
          grid.innerHTML = filtered.map(h => {
            const wrColor = parseFloat(h.wr) >= 50.0 ? 'var(--wr-good)' : 'var(--wr-bad)';
            return `<div class="hero-card" onclick="showView('herodetail', '${h.id}')">
              <div class="hero-avatar"><img src="" data-id="${h.id}"></div>
              <span class="hero-flavor">${h.title}</span>
              <span class="hero-name-label">${h.id}</span>
              <div class="card-stats">
                <span style="color:${wrColor}">${h.wr} WR</span>
                <span style="color:var(--text-dim)">|</span>
                <span style="color:var(--gold)">${h.spike}</span>
              </div>
            </div>`;
          }).join('');
          root.appendChild(wrap);
          grid.querySelectorAll('img').forEach(i => loadPortrait(i, i.dataset.id));
        }
      });
      if (root.innerHTML === '') root.innerHTML = `<div style="text-align:center; padding: 50px; color: var(--text-dim); font-family: 'Kanit'; font-size: 1.5rem;">No heroes match your search criteria.</div>`;
    }

                   <div style="width:${scores.m * 10}%; height:100%; background:var(--primary);"></div>
                </div>
                <span style="font-size:0.9rem; font-family:'Kanit'; font-weight:900; color:#fff; width:20px;">${scores.m}</span>
              </div>

              <div style="display:flex; align-items:center; gap:8px;">
                <span style="font-size:0.6rem; font-weight:800; color:var(--text-dim); width:40px;">LATE</span>
                <div style="flex:1; background:rgba(255,255,255,0.05); height:8px; border-radius:4px; overflow:hidden;">
                   <div style="width:${scores.l * 10}%; height:100%; background:var(--primary);"></div>
                </div>
                <span style="font-size:0.9rem; font-family:'Kanit'; font-weight:900; color:#fff; width:20px;">${scores.l}</span>
              </div>

            </div>

            <div class="stat-box draft-box"><div class="stat-label" style="margin-bottom: 8px;">Drafting Logic</div><div style="font-size: 0.95rem; font-weight: 700; color: #fff;">${h.draft}</div></div>
          </div>

          <div class="section-title">Strategic Spriteling Matrix</div>
          <div class="sprite-banner">
            <div class="sprite-icon-box">${s.icon}</div>
            <div>
              <div style="font-size:1.3rem; font-weight:900;">${h.sprite} Protocol</div>
              <div style="font-size:0.9rem; color:var(--gold); font-weight:700;">Bonus: ${s.bonus} | Cost: ${s.cost}</div>
              <div style="font-size:0.8rem; color:var(--text-dim); margin-top:5px;">${s.desc}</div>
            </div>
          </div>
        </div>
      `;
      loadPortrait(document.getElementById('det-img'), h.id);
    }

    function setMyDraftRole(role, btn) {
      draftState.myRole = role;
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      suggestedPickIds = [];
      renderDraftBoard();
    }

    function handleSlotClick(team, type, key) {
      activeDraftSlot = { team, type, key };
      if(type === 'pick') {
        const btn = document.querySelector(`.filter-btn[data-filter="${key}"]`);
        if(btn) setFilter(key, btn);
      }
      renderDraftBoard();
    }

    function handleHeroPoolClick(id) {
      if(!activeDraftSlot) { draftState.ally[draftState.myRole] = id; }
      else {
        if(activeDraftSlot.type === 'pick') draftState[activeDraftSlot.team][activeDraftSlot.key] = id;
        else if(activeDraftSlot.team === 'ally') draftState.allyBans[activeDraftSlot.key] = id;
        else draftState.enemyBans[activeDraftSlot.key] = id;
        activeDraftSlot = null;
      }
      suggestedPickIds = [];
      renderDraftBoard();
    }

    function suggestCounters() {
      const enemyHeroes = Object.values(draftState.enemy).filter(Boolean);
      if (enemyHeroes.length === 0) { alert("Let the enemy pick a hero first so we can counter them!"); return; }
      const drafted = [...Object.values(draftState.ally), ...Object.values(draftState.enemy), ...draftState.allyBans, ...draftState.enemyBans].filter(Boolean);
      
      const targetLane = draftState.myRole || 'Clash Lane';
      const roleHeroes = HEROES.filter(h => h.lane.includes(targetLane) && !drafted.includes(h.id));
      roleHeroes.sort((a, b) => parseFloat(b.wr) - parseFloat(a.wr));
      suggestedPickIds = roleHeroes.slice(0, 3).map(h => h.id);
      renderDraftPool();
    }

    function analyzeDraft() {
      const enemyIds = Object.values(draftState.enemy).filter(Boolean);
      const allyIds = Object.values(draftState.ally).filter(Boolean);
      const output = document.getElementById('item-response-output');
      
      let items = [];
      const healers = enemyIds.filter(id => { const h = HEROES.find(x => x.id === id); return h && h.traits?.includes('healer'); }).length;
      const tanks = enemyIds.filter(id => { const h = HEROES.find(x => x.id === id); return h && h.traits?.includes('tank'); }).length;
      const ccs = enemyIds.filter(id => { const h = HEROES.find(x => x.id === id); return h && h.traits?.includes('cc'); }).length;
      const bursts = enemyIds.filter(id => { const h = HEROES.find(x => x.id === id); return h && h.traits?.includes('burst'); }).length;

      if (healers >= 2) items.push('<div class="item-card" style="border-left-color: var(--s-tier);"><div class="item-priority" style="color: var(--s-tier);">★ RUSH PRIORITY</div><div class="item-name">Anti-Heal (Venomous/Mortal)</div><div class="item-desc">Extreme healing. Build 1st or 2nd item!</div></div>');
      else if (healers === 1) items.push('<div class="item-card"><div class="item-priority">Strategic Pivot</div><div class="item-name">Anti-Heal</div><div class="item-desc">Healer present. Get this as your 3rd full item.</div></div>');

      if (tanks >= 2) items.push('<div class="item-card"><div class="item-priority">Late Game</div><div class="item-name">Daybreaker / Void Staff</div><div class="item-desc">Multiple tanks. Need % Penetration as 3rd/4th item.</div></div>');
      if (ccs >= 3) items.push('<div class="item-card"><div class="item-priority">Mandatory</div><div class="item-name">Boots of Resistance</div><div class="item-desc">Heavy CC threat. Toughness is required to play.</div></div>');
      if (bursts >= 2) items.push('<div class="item-card"><div class="item-priority">Survival</div><div class="item-name">Pure Sky / Splendor</div><div class="item-desc">Enemy has dive threats. Build active survival items.</div></div>');

      output.innerHTML = items.length > 0 ? items.join('') : '<div style="color:var(--text-dim); font-size:0.65rem;">No situational item threats detected...</div>';

      const calcSpike = (team) => {
         const heroes = Object.values(team).filter(Boolean).map(id => HEROES.find(h => h.id === id));
         if (heroes.length === 0) return {e:0, m:0, l:0};
         let sum = {e:0, m:0, l:0};
         heroes.forEach(h => { const s = getHeroScores(h.spike); sum.e += s.e; sum.m += s.m; sum.l += s.l; });
         return { e: (sum.e / heroes.length), m: (sum.m / heroes.length), l: (sum.l / heroes.length) };
      };

      const allySpike = calcSpike(draftState.ally);
      const enemySpike = calcSpike(draftState.enemy);

      ['early', 'mid', 'late'].forEach(p => {
         const aVal = allySpike[p.charAt(0)];
         const eVal = enemySpike[p.charAt(0)];
         document.getElementById(`num-${p}-ally`).innerText = aVal.toFixed(1);
         document.getElementById(`bar-${p}-ally`).style.width = `${(aVal/10)*100}%`;
         document.getElementById(`num-${p}-enemy`).innerText = eVal.toFixed(1);
         document.getElementById(`bar-${p}-enemy`).style.width = `${(eVal/10)*100}%`;
      });

      const adviceBox = document.getElementById('draft-advice-text');
      let advice = '<span style="color:var(--text-dim); font-style:italic;">Draft heroes to analyze...</span>';
      
      if (allyIds.length > 0 && enemyIds.length > 0) {
        const eDiff = allySpike.e - enemySpike.e;
        const lDiff = allySpike.l - enemySpike.l;
        
        if (eDiff > 1.5) advice = '<span style="color:var(--wr-good);">Massive Early Advantage! Invade their jungle and force objectives quickly.</span>';
        else if (eDiff < -1.5) advice = '<span style="color:var(--s-tier);">Enemy snowballs early. Play safe under tower and avoid 5v5s until you scale.</span>';
        else if (lDiff > 1.5) advice = '<span style="color:var(--gold);">You hard-scale the enemy. Defend patiently and win the late game.</span>';
        else if (lDiff < -1.5) advice = '<span style="color:var(--s-tier);">Enemy late game is unstoppable. You MUST push and end the game early!</span>';
        else advice = '<span style="color:#fff;">Balanced matchup. Focus on standard macro and vision control around Dragons.</span>';
      }
      adviceBox.innerHTML = advice;
    }

    function renderDraftBoard() {
      const renderPicks = (team) => TEAM_ROLES.map(role => {
        const id = draftState[team][role], h = id ? HEROES.find(x => x.id === id) : null;
        const isActive = activeDraftSlot && activeDraftSlot.team === team && activeDraftSlot.type === 'pick' && activeDraftSlot.key === role;
        const isMe = team === 'ally' && draftState.myRole === role;
        const avatar = id ? `<img src="" data-id="${id}">` : `<div style="width:100%; height:100%; background:#000; border-radius:50%;"></div>`;
        return `<div class="draft-slot ${isActive?'active':''}" onclick="handleSlotClick('${team}', 'pick', '${role}')">
          <div class="hero-avatar" style="width:45px; height:45px; border: 2px solid ${id ? 'var(--primary)' : '#334155'};">${avatar}</div>
          <div style="flex:1"><div style="font-size:0.8rem; font-weight:800; color:${id ? '#fff' : '#64748b'};">${h ? h.title : 'SELECT...'}</div>${h ? `<div style="font-size:0.55rem; color:var(--primary); font-weight:700; text-transform:uppercase;">${h.id}</div>`:''}</div>
          ${isMe ? '<div class="my-role-badge">YOU</div>' : ''}<div class="slot-role-label">${role}</div></div>`;
      }).join('');

      const renderBans = (team) => (team === 'ally' ? draftState.allyBans : draftState.enemyBans).map((id, i) => {
        const isActive = activeDraftSlot && activeDraftSlot.team === team && activeDraftSlot.type === 'ban' && activeDraftSlot.key === i;
        const avatar = id ? `<img src="" data-id="${id}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">` : `<div style="width:100%; height:100%; background:#000; border-radius:50%;"></div>`;
        return `<div class="draft-slot ${isActive?'active':''}" style="width:45px; height:45px; margin-bottom:0; padding:0; justify-content:center; border: 2px dashed ${id ? 'rgba(239, 68, 68, 0.8)' : 'rgba(239, 68, 68, 0.4)'}; border-radius:50%; overflow:hidden;" onclick="handleSlotClick('${team}', 'ban', ${i})">${avatar}</div>`;
      }).join('');

      document.getElementById('ally-picks-container').innerHTML = renderPicks('ally');
      document.getElementById('enemy-picks-container').innerHTML = renderPicks('enemy');
      document.getElementById('ally-bans-container').innerHTML = renderBans('ally');
      document.getElementById('enemy-bans-container').innerHTML = renderBans('enemy');
      document.querySelectorAll('.draft-slot img').forEach(i => i.dataset.id && loadPortrait(i, i.dataset.id));
      
      renderDraftPool(); 
      analyzeDraft();
      saveDraftState();
    }

    function renderDraftPool() {
      const root = document.getElementById('draft-pool-root');
      const drafted = [...Object.values(draftState.ally), ...Object.values(draftState.enemy), ...draftState.allyBans, ...draftState.enemyBans].filter(Boolean);
      const filtered = HEROES.filter(h => (currentFilter === 'all' || h.lane.includes(currentFilter)) && (h.id.toLowerCase().includes(currentSearch) || h.title.toLowerCase().includes(currentSearch)))
                             .sort((a, b) => parseFloat(b.wr) - parseFloat(a.wr));
      
      root.innerHTML = filtered.map(h => `<div class="pool-hero ${drafted.includes(h.id)?'drafted':''} ${suggestedPickIds.includes(h.id)?'suggested':''}" onclick="handleHeroPoolClick('${h.id}')"><div class="pool-hero-img"><img src="" data-id="${h.id}"></div><div class="pool-hero-title">${h.title}</div><div style="font-size:0.45rem; color:var(--text-dim); text-transform:uppercase;">${h.id}</div></div>`).join('');
      root.querySelectorAll('img').forEach(i => loadPortrait(i, i.dataset.id));

      if (root.innerHTML === '') root.innerHTML = `<div style="text-align:center; padding: 30px; color: var(--text-dim); font-family: 'Kanit'; font-size: 1.2rem; grid-column: 1/-1;">No heroes found.</div>`;
    }

    function exportDraft() {
        let text = "🏆 HONOR OF KINGS DRAFT 🏆\n\n🟦 ALLY TEAM:\n";
        TEAM_ROLES.forEach(r => { const id = draftState.ally[r]; text += `- ${r}: ${id ? HEROES.find(x => x.id === id).title : 'Empty'}\n`; });
        text += "\n🟥 ENEMY TEAM:\n";
        TEAM_ROLES.forEach(r => { const id = draftState.enemy[r]; text += `- ${r}: ${id ? HEROES.find(x => x.id === id).title : 'Empty'}\n`; });
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('export-btn'); btn.innerText = "✅ Copied!";
            setTimeout(() => btn.innerText = "📋 Copy Draft", 2000);
        });
    }

    function resetDraft() {
      draftState.ally = { 'Clash Lane': null, 'Jungle': null, 'Mid Lane': null, 'Farm Lane': null, 'Roam': null };
      draftState.enemy = { 'Clash Lane': null, 'Jungle': null, 'Mid Lane': null, 'Farm Lane': null, 'Roam': null };
      draftState.allyBans = [null, null, null]; draftState.enemyBans = [null, null, null];
      activeDraftSlot = null; suggestedPickIds = []; renderDraftBoard();
    }

    function handleSearch() { currentSearch = document.getElementById('search-input').value.toLowerCase(); if(activeTab==='list') renderList(); else renderDraftPool(); }
    
    function setFilter(f, b) { 
      currentFilter = f; 
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active')); 
      b.classList.add('active'); 
      if(activeTab==='list') renderList(); else renderDraftPool(); 
    }
    
    window.onload = () => { 
      loadDraftState();
      renderList(); 
      renderDraftBoard(); 
    };
  </script>
</body>
</html>
