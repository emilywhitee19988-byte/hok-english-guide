<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOK Tier List - Root Directory Version</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; line-height: 1.4; }
    .container { max-width: 1400px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 30px; padding: 25px; background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); border-radius: 20px; }
    .controls { display: flex; gap: 12px; margin-bottom: 25px; background: rgba(30, 41, 59, 0.6); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
    .search-box { flex: 1; }
    .search-box input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #334155; background: #000; color: white; outline: none; }
    
    .tier-section { margin-bottom: 25px; background: rgba(30, 41, 59, 0.4); border-radius: 15px; overflow: hidden; border: 1px solid #334155; }
    .tier-header { padding: 10px 20px; font-size: 1.2rem; font-weight: 800; }
    .tier-s { background: #ef4444; } .tier-a { background: #f97316; } .tier-b { background: #facc15; color: #000; } .tier-c { background: #22c55e; }
    .tier-content { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
    
    .hero-card { background: #1e293b; border: 1.5px solid #334155; border-radius: 12px; padding: 12px; text-align: center; }
    .hero-avatar { width: 75px; height: 75px; margin: 0 auto 10px; border-radius: 50%; border: 3px solid #3b82f6; overflow: hidden; background: #000; }
    .hero-avatar img { width: 100%; height: 100%; object-fit: cover; }
    
    .hero-title-main { font-size: 0.95rem; font-weight: 800; color: #fff; margin-bottom: 2px; }
    .hero-name-blue { font-size: 11px; color: #60a5fa; font-weight: 600; margin-bottom: 8px; display: block; }
    
    .hero-role-badge { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: white; }
    .role-tank { background: #1e40af; } .role-fighter { background: #dc2626; } .role-assassin { background: #7c3aed; } .role-mage { background: #2563eb; } .role-marksman { background: #ea580c; } .role-support { background: #059669; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><h1>🎮 HOK Tier List</h1><p>Images loaded from Main Directory</p></div>
    <div class="controls"><div class="search-box"><input type="text" id="search-input" placeholder="Search Title or Name..." oninput="filterHeroes()"></div></div>
    <div id="tier-container"></div>
  </div>

  <script>
    // DATABASE: MUST MATCH FILENAMES EXACTLY (Capitals & Spaces)
    const HEROES = {
      'Alessio': { real: 'Alessio', role: 'Marksman', tier: 'C' },
      'Allain': { real: 'Allain', role: 'Fighter', tier: 'A' },
      'Cai Yan': { real: 'Cai Yan', role: 'Support', tier: 'S' },
      'Kui': { real: 'Kui', role: 'Mage', tier: 'B' },
      'Arke': { real: 'Arke', role: 'Assassin', tier: 'S' },
      'Ata': { real: 'Ata', role: 'Tank', tier: 'B' },
      'Butterfly': { real: 'Butterfly', role: 'Assassin', tier: 'B' },
      'Chano': { real: 'Chano', role: 'Marksman', tier: 'B' },
      'Cirrus': { real: 'Cirrus', role: 'Assassin', tier: 'A' },
      'Dharma': { real: 'Dharma', role: 'Tank', tier: 'B' },
      'Di Renjie': { real: 'Di Renjie', role: 'Marksman', tier: 'C' },
      'Donghuang': { real: 'Donghuang', role: 'Tank', tier: 'S' },
      'Dun': { real: 'Dun', role: 'Tank', tier: 'A' },
      'Dyadia': { real: 'Dyadia', role: 'Support', tier: 'A' },
      'Fang': { real: 'Fang', role: 'Support', tier: 'B' },
      'Guan Yu': { real: 'Guan Yu', role: 'Fighter', tier: 'B' },
      'Guiguzi': { real: 'Guiguzi', role: 'Support', tier: 'B' },
      'Han Xin': { real: 'Han Xin', role: 'Assassin', tier: 'B' },
      'Hou Yi': { real: 'Hou Yi', role: 'Marksman', tier: 'S' },
      'Huang Zhong': { real: 'Huang Zhong', role: 'Marksman', tier: 'C' },
      'Lady Sun': { real: 'Lady Sun', role: 'Marksman', tier: 'B' },
      'Lady Zhen': { real: 'Lady Zhen', role: 'Mage', tier: 'A' },
      'Liu Bang': { real: 'Liu Bang', role: 'Tank', tier: 'B' },
      'Liu Shan': { real: 'Liu Shan', role: 'Tank', tier: 'B' },
      'Lu Bu': { real: 'Lu Bu', role: 'Fighter', tier: 'B' },
      'Luara': { real: 'Luara', role: 'Marksman', tier: 'A' },
      'Luban No. 7': { real: 'Luban', role: 'Marksman', tier: 'B' },
      'Meng Ya': { real: 'Meng Ya', role: 'Marksman', tier: 'B' },
      'Menki': { real: 'Menki', role: 'Fighter', tier: 'B' },
      'Nakoruru': { real: 'Nakoruru', role: 'Assassin', tier: 'B' },
      'Nezha': { real: 'Nezha', role: 'Fighter', tier: 'C' },
      'Nuwa': { real: 'Nuwa', role: 'Mage', tier: 'B' },
      'Pei': { real: 'Pei', role: 'Assassin', tier: 'B' },
      'Prince of Lanling': { real: 'Lanling', role: 'Assassin', tier: 'S' },
      'Princess Frost': { real: 'Wang Zhaojun', role: 'Mage', tier: 'S' },
      'Shangguan': { real: 'Shangguan', role: 'Assassin', tier: 'C' },
      'Shi': { real: 'Xi Shi', role: 'Mage', tier: 'B' },
      'Shouyue': { real: 'Shouyue', role: 'Marksman', tier: 'B' },
      'Angela': { real: 'Angela', role: 'Mage', tier: 'S' },
      'Heartseeker': { real: 'Deji', role: 'Mage', tier: 'S' },
      'Gunslinger': { real: 'Marco Polo', role: 'Marksman', tier: 'S' }
    };

    Object.keys(HEROES).forEach(name => {
      let h = HEROES[name];
      h.title = name;
      
      // We removed the "hero_portraits/" folder prefix!
      // Now it looks in the same spot as index.html
      let safePath = encodeURIComponent(name);
      h.imgPng = `./${safePath}.png`;
      h.imgJpg = `./${safePath}.jpg`;
      
      h.fallback = `https://ui-avatars.com/api/?name=%20&background=1e293b&color=60a5fa`;
    });

    function renderAllTiers() {
      const container = document.getElementById('tier-container');
      container.innerHTML = '';
      ['S', 'A', 'B', 'C'].forEach(tier => {
        const heroes = Object.values(HEROES).filter(h => h.tier === tier);
        if (heroes.length > 0) {
          const section = document.createElement('div');
          section.className = 'tier-section';
          section.innerHTML = `<div class="tier-header tier-${tier.toLowerCase()}">${tier}-TIER</div><div class="tier-content" id="tier-${tier.toLowerCase()}"></div>`;
          container.appendChild(section);
          
          const content = document.getElementById(`tier-${tier.toLowerCase()}`);
          content.innerHTML = heroes.map(h => `
            <div class="hero-card">
              <div class="hero-avatar">
                <img src="${h.imgPng}" onerror="if (this.src.indexOf('.png') !== -1) { this.src='${h.imgJpg}'; } else { this.src='${h.fallback}'; }">
              </div>
              <div class="hero-title-main">${h.title}</div>
              <div class="hero-name-blue">${h.real}</div>
              <div class="hero-role-badge role-${h.role.toLowerCase()}">${h.role}</div>
            </div>
          `).join('');
        }
      });
    }

    function filterHeroes() {
      const search = document.getElementById('search-input').value.toLowerCase();
      document.querySelectorAll('.hero-card').forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(search) ? 'block' : 'none';
      });
    }

    window.onload = renderAllTiers;
  </script>
</body>
</html>
