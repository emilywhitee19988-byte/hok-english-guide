<!DOCTYPE html>
<html lang="en">

  <meta charset="UTF-8">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; line-height: 1.5; }
    .container { max-width: 1400px; margin: 0 auto; }
    .view { display: none; }
    .view.active { display: block; }
    
    /* Header */
    .header { text-align: center; margin-bottom: 30px; padding: 30px; background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .controls { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; background: rgba(30, 41, 59, 0.6); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
    .search-box { flex: 1; min-width: 250px; }
    .search-box input { width: 100%; padding: 12px 15px; border: 2px solid #334155; border-radius: 10px; background: #000; color: white; outline: none; }
    
    .filter-btn { padding: 8px 16px; border: 1px solid #334155; border-radius: 8px; background: rgba(15, 23, 42, 0.8); color: #94a3b8; cursor: pointer; font-weight: 600; }
    .filter-btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }
    
    /* Tier Grid */
    .tier-section { margin-bottom: 30px; background: rgba(30, 41, 59, 0.4); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
    .tier-header { padding: 12px 20px; font-size: 1.3rem; font-weight: 900; }
    .tier-s { background: #ef4444; } .tier-a { background: #f97316; } .tier-b { background: #facc15; color: #000; } .tier-c { background: #22c55e; }
    .tier-content { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
    
    /* Hero Card */
    .hero-card { background: #1e293b; border: 1.5px solid #334155; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
    .hero-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
    .hero-avatar { width: 75px; height: 75px; margin: 0 auto 10px; border-radius: 50%; border: 3px solid #3b82f6; overflow: hidden; }
    .hero-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .hero-flavor-txt { font-size: 0.95rem; font-weight: 800; color: #fff; margin-bottom: 2px; display: block; line-height: 1.2; }
    .hero-name-txt { font-size: 0.75rem; color: #60a5fa; font-weight: bold; text-transform: uppercase; display: block; }

    /* Detail Page */
    .detail-card { background: #1e293b; padding: 40px; border-radius: 25px; border: 1px solid #3b82f6; max-width: 750px; margin: 0 auto; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-top: 25px; }
    .stat-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
    .stat-val { font-size: 1.5rem; font-weight: 900; color: #4ade80; display: block; }
    .back-btn { padding: 12px 24px; background: #3b82f6; border: none; color: white; border-radius: 10px; cursor: pointer; margin-bottom: 30px; font-weight: 700; }

    /* Counter Section */
    .counter-section { margin-top: 30px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 15px; border: 1px solid #ef4444; }
    .counter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 15px; }
    .counter-item { background: #0f172a; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #334155; }
    .counter-img { width: 45px; height: 45px; border-radius: 50%; margin-bottom: 5px; border: 2px solid #ef4444; }
    .counter-title { font-size: 0.75rem; font-weight: bold; color: #fff; display: block; }

    @media (max-width: 768px) { .tier-content { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); } }
  </style>

    function showView(v, id = null) {
      document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
      document.getElementById('view-' + v).classList.add('active');
      if (v === 'herodetail' && id) renderDetail(id);
      window.scrollTo(0,0);
    }

    function renderDetail(id) {
      const h = HERO_DATA.find(x => x.id === id);
      const img = `hero_portraits/${encodeURIComponent(h.id)}${h.ext || '.png'}`;
      
      // Map names to titles for counters
      const counterItems = h.counters.map(cName => {
        const cHero = HERO_DATA.find(x => x.id === cName) || { title: cName, id: cName };
        const cImg = `hero_portraits/${encodeURIComponent(cHero.id)}${cHero.ext || '.png'}`;
        return `
          <div class="counter-item">
            <img src="${cImg}" class="counter-img" onerror="this.src='https://ui-avatars.com/api/?name=${cHero.id}&background=0f172a&color=fff';">
            <span class="counter-title">${cHero.title}</span>
          </div>
        `;
      }).join('');

      document.getElementById('detail-root').innerHTML = `
        <div class="detail-card">
          <img src="${img}" style="width:130px; height:130px; border-radius:50%; border:4px solid #3b82f6; margin:0 auto 20px; display:block;" onerror="this.src='https://ui-avatars.com/api/?name=${id}&background=1e293b&color=fff';">

            <div class="stat-box"><span class="stat-val" style="color:#ef4444">${h.tier}</span>TIER</div>

            <div class="stat-box"><span class="stat-val" style="color:#60a5fa">15.4%</span>PICK RATE</div>
            <div class="stat-box"><span class="stat-val" style="color:#facc15">BAN</span>8.2%</div>
          </div>

          <div class="counter-section">
            <h3 style="color:#ef4444; font-size:1.2rem; text-align:center; border-bottom:1px solid rgba(239, 68, 68, 0.3); padding-bottom:10px;">🔥 TOP COUNTERS</h3>
            <div class="counter-grid">${counterItems}</div>
          </div>
        </div>
      `;
    }

    function renderList() {
      const root = document.getElementById('tier-list-root');
      root.innerHTML = '';
      
      ['S', 'A', 'B', 'C'].forEach(t => {
        const filtered = HERO_DATA.filter(h => {
          const matchTier = h.tier === t;
          const matchRole = activeRole === 'all' || h.role === activeRole;
          const matchSearch = h.id.toLowerCase().includes(searchQuery) || h.title.toLowerCase().includes(searchQuery);
          return matchTier && matchRole && matchSearch;
        });

        if (filtered.length > 0) {
          const sec = document.createElement('div');
          sec.className = 'tier-section';
          sec.innerHTML = `<div class="tier-header tier-${t.toLowerCase()}">${t}-TIER</div><div class="tier-content"></div>`;
          const content = sec.querySelector('.tier-content');
          
          content.innerHTML = filtered.map(h => `
            <div class="hero-card" onclick="showView('herodetail', '${h.id}')">
              <div class="hero-avatar">
                <img src="hero_portraits/${encodeURIComponent(h.id)}${h.ext || '.png'}" onerror="this.src='https://ui-avatars.com/api/?name=%20&background=1e293b&color=60a5fa';">
              </div>
              <span class="hero-flavor-txt">${h.title}</span>
              <span class="hero-name-txt">${h.id}</span>
            </div>
          `).join('');
          root.appendChild(sec);
        }
      });
    }

    function setRole(r, b) {
      activeRole = r;
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      b.classList.add('active');
      renderList();
    }

    function handleSearch() {
      searchQuery = document.getElementById('search-input').value.toLowerCase();
      renderList();
    }

    window.onload = renderList;
