<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root {
      --primary: #3b82f6; --bg: #020617; --card-bg: #111827;
      --gold: #fbbf24; --text: #f8fafc; --text-dim: #94a3b8;
      --s-tier: #ef4444; --a-tier: #f97316; --b-tier: #facc15;
      --wr-good: #10b981; --wr-bad: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: env(safe-area-inset-top) 15px 40px; line-height: 1.6; }
    .container { max-width: 1200px; margin: 0 auto; }
    .view { display: none; opacity: 0; }
    .view.active { display: block; opacity: 1; transition: opacity 0.3s ease; }
    
    .header { 
      text-align: center; margin-bottom: 25px; padding: 60px 20px; 
      background: radial-gradient(circle at top, #1e3a8a 0%, #020617 100%); 
      border-radius: 32px; border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
    }
    .header h1 { font-family: 'Kanit'; font-size: clamp(2rem, 5vw, 3.5rem); text-transform: uppercase; background: linear-gradient(to bottom, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
    .meta-tag { display: inline-block; padding: 4px 12px; background: var(--primary); color: white; font-size: 0.7rem; font-weight: 900; border-radius: 20px; text-transform: uppercase; letter-spacing: 1px; }

    .nav-bar { 
      position: sticky; top: 10px; z-index: 100; display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; 
      background: rgba(15, 23, 42, 0.95); padding: 12px; border-radius: 20px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);
    }
    .search-box { flex: 1; min-width: 250px; }
    .search-box input { width: 100%; padding: 14px; border: 1px solid #334155; border-radius: 14px; background: #000; color: white; outline: none; font-size: 0.95rem; }
    .filter-btn { padding: 10px 18px; border: 1px solid #334155; border-radius: 10px; background: transparent; color: var(--text-dim); cursor: pointer; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; transition: 0.2s; }
    .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    .tier-wrapper { margin-bottom: 40px; }
    .tier-label { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; font-family: 'Kanit'; font-size: 1.1rem; font-weight: 800; }
    .tier-line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
    .tier-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
    
    .hero-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; text-align: center; cursor: pointer; transition: 0.4s; position: relative; }
    .hero-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 15px 30px -10px rgba(59, 130, 246, 0.4); }
    
    .hero-avatar { width: 80px; height: 80px; margin: 0 auto 12px; border-radius: 50%; border: 2px solid var(--primary); overflow: hidden; background: #000; }
    .hero-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .hero-fallback { width: 80px; height: 80px; margin: 0 auto 12px; border-radius: 50%; border: 2px solid var(--primary); display: flex; align-items: center; justify-content: center; background: #1e293b; color: var(--primary); font-family: 'Kanit'; font-size: 2.2rem; font-weight: 900; }
    
    .lane-badge { position: absolute; top: 12px; right: 12px; font-size: 0.6rem; background: rgba(15, 23, 42, 0.9); padding: 3px 7px; border-radius: 6px; color: var(--primary); font-weight: 900; border: 1px solid var(--primary); }
    .hero-flavor { font-size: 0.85rem; font-weight: 800; color: #fff; display: block; margin-bottom: 2px; line-height: 1.1; }
    .hero-name { font-size: 0.65rem; color: var(--text-dim); font-weight: 700; text-transform: uppercase; margin-bottom: 8px; display: block; }
    
    /* Micro Stats on Card */
    .card-stats { display: flex; justify-content: center; gap: 10px; font-size: 0.65rem; font-weight: 800; }
    .stat-wr { color: var(--wr-good); }
    .stat-pr { color: var(--gold); }

    .dashboard { background: var(--card-bg); padding: 40px; border-radius: 32px; border: 1px solid rgba(255,255,255,0.1); max-width: 900px; margin: 0 auto; }
    .section-title { color: var(--primary); font-size: 0.85rem; font-weight: 900; margin: 35px 0 15px; border-bottom: 1px solid #334155; padding-bottom: 8px; text-transform: uppercase; letter-spacing: 2px; }
    
    /* Analytics Grid */
    .analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .stat-box { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; text-align: center; }
    .stat-box.draft-box { grid-column: 1 / -1; text-align: left; border-left: 4px solid var(--primary); }
    .stat-value { font-family: 'Kanit'; font-size: 2rem; color: #fff; line-height: 1; margin-bottom: 5px; }
    .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
    
    .sprite-banner { background: linear-gradient(135deg, #1e40af 0%, #020617 100%); padding: 25px; border-radius: 24px; border: 1px solid var(--primary); display: flex; align-items: center; gap: 20px; }
    .sprite-icon-box { width: 60px; height: 60px; background: #000; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; border: 2px solid var(--gold); }
    .back-btn { padding: 12px 25px; background: transparent; border: 1px solid var(--primary); color: var(--primary); border-radius: 12px; cursor: pointer; margin-bottom: 30px; font-weight: 800; text-transform: uppercase; font-size: 0.75rem; }
    .status-badge { font-size: 0.75rem; color: var(--text-dim); margin-top: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

    @media (max-width: 768px) { .tier-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); } .dashboard { padding: 20px; } }
  </style>
</head>

    let currentRole = 'all'; let currentSearch = '';

    function showView(v, id = null) {
      document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
      document.getElementById('view-' + v).classList.add('active');
      if (v === 'herodetail' && id) renderDetail(id);
      window.scrollTo(0,0);
    }

    function loadPortrait(el, id) {
      const encodedId = encodeURIComponent(id);
      const paths = [
        `hero_portraits/${id}.png`, 
        `hero_portraits/${encodedId}.png`, 
        `hero_portraits/${id.toLowerCase()}.png`, 
        `hero_portraits/${id.replace(/ /g, '').toLowerCase()}.png`,
        `hero_portraits/${id}.jpg`
      ];
      
      let i = 0;
      el.onerror = () => {
        if (i < paths.length) {
          el.src = paths[i++];
        } else {
          const initial = id.charAt(0).toUpperCase();
          el.outerHTML = `<div class="hero-fallback">${initial}</div>`;
        }
      };
      el.src = paths[i++];
    }

      document.getElementById('detail-root').innerHTML = `

          <div style="display:flex; align-items:center; gap:30px; flex-wrap:wrap; margin-bottom:30px;">

              <div style="margin-top:10px;">

                <span style="padding:5px 15px; background:rgba(255,255,255,0.1); border-radius:20px; font-weight:900; font-size:0.8rem; margin-left:8px;">${h.role}</span>

            </div>
          </div>

          <div class="analytics-grid">
            <div class="stat-box">
              <div class="stat-value" style="color: ${wrColor}">${h.wr}</div>
              <div class="stat-label">Global Winrate</div>
            </div>
            <div class="stat-box">
              <div class="stat-value" style="color: var(--gold)">${h.pr}</div>
              <div class="stat-label">Pick / Ban Rate</div>
            </div>
            <div class="stat-box">
              <div class="stat-value" style="font-size: 1.5rem; padding-top:5px;">${h.spike}</div>
              <div class="stat-label">Power Spike Phase</div>
            </div>
            <div class="stat-box draft-box">
              <div class="stat-label" style="margin-bottom: 8px;">Drafting Logic / When to Pick</div>
              <div style="font-size: 0.95rem; font-weight: 700; color: #fff;">${h.draft}</div>
            </div>
          </div>

          <div class="section-title">Strategic Spriteling Matrix</div>
          <div class="sprite-banner">
            <div class="sprite-icon-box">${s.icon}</div>
            <div>
              <div style="font-size:1.3rem; font-weight:900;">${h.sprite} Protocol</div>
              <div style="font-size:0.9rem; color:var(--gold); font-weight:700;">Bonus: ${s.bonus} | Cost: ${s.cost}</div>
              <div style="font-size:0.8rem; color:var(--text-dim); margin-top:5px;">${s.desc}</div>

      loadPortrait(document.getElementById('det-img'), h.id);

    function renderList() {
      const root = document.getElementById('tier-list-root');
      root.innerHTML = ''; let count = 0;
      ['S', 'A', 'B'].forEach(t => {
        const filtered = HERO_DATA.filter(h => h.tier === t && (currentRole === 'all' || h.role.includes(currentRole)) && (h.id.toLowerCase().includes(currentSearch) || h.title.toLowerCase().includes(currentSearch)));
        if (filtered.length > 0) {
          const wrap = document.createElement('div'); wrap.className = 'tier-wrapper';
          wrap.innerHTML = `<div class="tier-label"><span>${t}-TIER</span><div class="tier-line"></div></div><div class="tier-grid"></div>`;
          const grid = wrap.querySelector('.tier-grid');
          grid.innerHTML = filtered.map(h => { 
            count++; 
            const wrColor = parseFloat(h.wr) >= 50.0 ? 'var(--wr-good)' : 'var(--wr-bad)';
            return `
            <div class="hero-card" onclick="showView('herodetail', '${h.id}')">
              <div class="hero-avatar"><img src="" data-id="${h.id}"></div>
              <span class="hero-flavor">${h.title}</span>
              <span class="hero-name">${h.id}</span>
              <div class="card-stats">
                <span style="color:${wrColor}">${h.wr} WR</span>
                <span style="color:var(--text-dim)">|</span>
                <span style="color:var(--gold)">${h.spike}</span>
              </div>
            </div>`; 
          }).join('');
          root.appendChild(wrap);
          grid.querySelectorAll('img').forEach(i => loadPortrait(i, i.dataset.id));
        }
      });
      document.getElementById('status-text').innerText = `Database Synchronized: ${count} / ${HERO_DATA.length} Heroes Active`;
    }

    function setRole(r, b) { currentRole = r; document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active')); b.classList.add('active'); renderList(); }
    function handleSearch() { currentSearch = document.getElementById('search-input').value.toLowerCase(); renderList(); }

    window.onload = renderList;
  </script>
