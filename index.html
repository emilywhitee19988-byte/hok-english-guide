<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honor of Kings | Global Competitive Meta Encyclopedia</title>
  <style>
    :root {
      --primary-blue: #3b82f6;
      --bg-dark: #0f172a;
      --card-bg: #1e293b;
      --accent-gold: #facc15;
      --text-main: #e2e8f0;
      --text-dim: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', system-ui, -apple-system, sans-serif; 
      background: var(--bg-dark); 
      color: var(--text-main); 
      padding: 15px; 
      line-height: 1.6;
    }

    .container { max-width: 1200px; margin: 0 auto; }
    .view { display: none; }
    .view.active { display: block; }
    
    /* PROFESSIONAL HEADER */
    .header { 
      text-align: center; 
      margin-bottom: 25px; 
      padding: 40px 20px; 
      background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%); 
      border-radius: 24px; 
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .header h1 { 
      font-size: 2.2rem; 
      letter-spacing: 2px; 
      font-weight: 900; 
      text-transform: uppercase;
      background: linear-gradient(to right, #fff, var(--primary-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .header p { color: var(--text-dim); font-size: 0.95rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }

    /* FILTERS */
    .controls { 
      display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; 
      background: rgba(30, 41, 59, 0.4); padding: 12px; border-radius: 16px; 
      backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05);
    }
    .search-box { flex: 1; min-width: 250px; }
    .search-box input { 
      width: 100%; padding: 14px; border: 1px solid #334155; border-radius: 12px; 
      background: #000; color: white; outline: none; font-size: 0.9rem;
    }
    .filter-btn { 
      padding: 10px 18px; border: 1px solid #334155; border-radius: 10px; 
      background: transparent; color: var(--text-dim); cursor: pointer; 
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase; transition: 0.3s;
    }
    .filter-btn.active { background: var(--primary-blue); border-color: var(--primary-blue); color: white; }

    /* TIER GRID */
    .tier-section { margin-bottom: 30px; border-radius: 20px; overflow: hidden; background: rgba(30, 41, 59, 0.2); border: 1px solid rgba(255,255,255,0.05); }
    .tier-header { padding: 12px 25px; font-size: 1rem; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; }
    .tier-s { background: #ef4444; color: #fff; } 
    .tier-a { background: #f97316; color: #fff; } 
    .tier-b { background: #facc15; color: #000; } 
    .tier-c { background: #22c55e; color: #fff; }
    .tier-content { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
    
    /* HERO CARDS */
    .hero-card { 
      background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; 
      padding: 15px; text-align: center; cursor: pointer; transition: all 0.3s; position: relative;
    }
    .hero-card:hover { transform: translateY(-5px); border-color: var(--primary-blue); }
    .hero-avatar { width: 70px; height: 70px; margin: 0 auto 12px; border-radius: 50%; border: 2px solid var(--primary-blue); overflow: hidden; }
    .hero-avatar img { width: 100%; height: 100%; object-fit: cover; }
    
    .lane-badge { position: absolute; top: 10px; right: 10px; font-size: 0.55rem; background: rgba(15, 23, 42, 0.9); padding: 3px 7px; border-radius: 6px; color: var(--primary-blue); font-weight: 800; border: 1px solid var(--primary-blue); }
    .hero-flavor-txt { font-size: 0.85rem; font-weight: 800; color: #fff; margin-bottom: 2px; display: block; line-height: 1.1; }
    .hero-name-txt { font-size: 0.7rem; color: var(--primary-blue); font-weight: 700; text-transform: uppercase; }

    /* DETAIL PANEL */
    .detail-card { background: var(--card-bg); padding: 35px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.1); max-width: 850px; margin: 0 auto; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
    .section-title { color: var(--primary-blue); font-size: 0.85rem; font-weight: 900; margin: 25px 0 12px; border-bottom: 1px solid #334155; padding-bottom: 6px; text-transform: uppercase; letter-spacing: 2px; }
    .item-slot { background: #0f172a; border: 1px solid #334155; padding: 7px 12px; border-radius: 8px; font-size: 0.75rem; color: #fff; font-weight: 700; display: inline-block; margin: 3px; }
    
    .spriteling-box { background: linear-gradient(135deg, #1e40af 0%, #1e1b4b 100%); padding: 20px; border-radius: 18px; display: flex; align-items: center; gap: 20px; border: 1px solid var(--primary-blue); }
    .sprite-icon { width: 50px; height: 50px; background: #000; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border: 2px solid var(--accent-gold); }

    .arcana-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .arcana-box { padding: 12px; border-radius: 10px; text-align: center; font-size: 0.75rem; font-weight: 800; border: 1px solid rgba(255,255,255,0.05); }
    .arc-red { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: #ef4444; }
    .arc-blue { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-color: #3b82f6; }
    .arc-green { background: rgba(34, 197, 94, 0.1); color: #22c55e; border-color: #22c55e; }

    .back-btn { padding: 12px 24px; background: var(--primary-blue); border: none; color: white; border-radius: 10px; cursor: pointer; margin-bottom: 25px; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; }
    
    @media (max-width: 768px) { .tier-content { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); } .arcana-grid { grid-template-columns: 1fr; } }
  </style>
</head>

      { id: 'Wang Zhaojun', title: 'Wang Zhaojun', role: 'Mage', tier: 'B', lane: 'MID', sprite: 'Coolio' },

      // C-TIER
      { id: 'Alessio', title: 'Red Hawk', role: 'Marksman', tier: 'C', lane: 'FARM', sprite: 'Runsie' },
      { id: 'Xiang Yu', title: 'Ultimate Weapon', role: 'Tank', tier: 'C', lane: 'CLASH', sprite: 'Bigly' },
      { id: 'Ming', title: 'Star Teller', role: 'Support', tier: 'C', lane: 'ROAM', sprite: 'Coolio' },
      { id: 'Nezha', title: 'Wild Spark', role: 'Fighter', tier: 'C', lane: 'CLASH', sprite: 'Runsie' },
      { id: 'Yang Jian', title: 'Avici Puppeteer', role: 'Fighter', tier: 'C', lane: 'JUNGLE', sprite: 'Bigly' },
      { id: 'Shangguan', title: 'Calligrapher', role: 'Assassin', tier: 'C', lane: 'MID', sprite: 'Coolio' },
      { id: 'Sima Yi', title: 'Shadowreaper', role: 'Assassin', tier: 'C', lane: 'JUNGLE', sprite: 'Runsie' },
      { id: 'Zilong', title: 'Fearless Spear', role: 'Assassin', tier: 'C', lane: 'JUNGLE', sprite: 'Runsie' },
      { id: 'Zhou Yu', title: 'Inferno', role: 'Mage', tier: 'C', lane: 'MID', sprite: 'Coolio' }
    ];

    function showView(v, id = null) {
      document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
      document.getElementById('view-' + v).classList.add('active');
      if (v === 'herodetail' && id) renderDetail(id);
      window.scrollTo(0,0);
    }

    function renderDetail(id) {
      const h = HEROES.find(x => x.id === id);
      const sprite = SPRITE_INFO[h.sprite] || SPRITE_INFO['Bigly'];
      
      document.getElementById('detail-root').innerHTML = `
        <div class="detail-card">
          <div style="display:flex; align-items:center; gap:25px; flex-wrap:wrap; margin-bottom:25px;">
            <img src="hero_portraits/${encodeURIComponent(h.id)}.png" style="width:115px; height:115px; border-radius:50%; border:3px solid var(--primary-blue);" onerror="this.src='hero_portraits/${h.id}.jpg'; this.onerror=function(){this.src='https://ui-avatars.com/api/?name=${id}&background=1e293b&color=fff';};">
            <div>
              <h2 style="font-size:2.5rem; line-height:1.1;">${h.title}</h2>
              <p style="color:var(--primary-blue); font-weight:900; font-size:1.4rem;">${h.id.toUpperCase()}</p>
              <div style="margin-top:10px;"><span class="lane-badge" style="position:static;">${h.lane}</span></div>
            </div>
          </div>
          <div class="section-title">Strategic Spriteling Assignment</div>
          <div class="spriteling-box">
            <div class="sprite-icon">${sprite.icon}</div>
            <div>
              <div style="font-size:1.2rem; font-weight:900; color:#fff;">${h.sprite} Protocol</div>
              <div style="font-size:0.8rem; color:#c7d2fe;">${sprite.desc}</div>
            </div>
          </div>
          <div class="section-title">Tactical Gear Setup</div>
          <div style="display:flex; flex-wrap:wrap; gap:6px;">${(h.build || ['Standard Tactical Setup']).map(i => `<div class="item-slot">${i}</div>`).join('')}</div>
          <div class="section-title">Optimal Arcana matrix</div>
          <div class="arcana-grid">
            <div class="arcana-box arc-red">RED: ${(h.arcana || ['Set'])[0]}</div>
            <div class="arcana-box arc-blue">BLUE: ${(h.arcana || ['Set'])[1]}</div>
            <div class="arcana-box arc-green">GREEN: ${(h.arcana || ['Set'])[2]}</div>
          </div>
        </div>
      `;
    }

    function renderList() {
      const root = document.getElementById('tier-list-root');
      root.innerHTML = '';
      ['S', 'A', 'B', 'C'].forEach(t => {
        const filtered = HEROES.filter(h => h.tier === t && (activeRole === 'all' || h.role === activeRole) && (h.id.toLowerCase().includes(searchQuery) || h.title.toLowerCase().includes(searchQuery)));
        if (filtered.length > 0) {
          const sec = document.createElement('div');
          sec.className = 'tier-section';
          sec.innerHTML = `<div class="tier-header tier-${t.toLowerCase()}">${t}-TIER COMPETITIVE META</div><div class="tier-content"></div>`;
          const content = sec.querySelector('.tier-content');
          content.innerHTML = filtered.map(h => `
            <div class="hero-card" onclick="showView('herodetail', '${h.id}')">
              <div class="lane-badge">${h.lane}</div>
              <div class="hero-avatar">
                <img src="hero_portraits/${encodeURIComponent(h.id)}.png" onerror="this.src='hero_portraits/${h.id}.jpg'; this.onerror=function(){this.src='https://ui-avatars.com/api/?name=%20&background=1e293b&color=60a5fa';};">
              </div>
              <span class="hero-flavor-txt">${h.title}</span>
              <span class="hero-name-txt">${h.id}</span>
            </div>
          `).join('');
          root.appendChild(sec);
        }
      });
    }

    let activeRole = 'all';
    let searchQuery = '';
    function setRole(role, btn) {
      activeRole = role;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderList();
    }
    function handleSearch() {
      searchQuery = document.getElementById('search-input').value.toLowerCase();
      renderList();
    }
    window.onload = renderList;
  </script>
</body>
</html>
