<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; padding: 15px; line-height: 1.5; }
    .container { max-width: 1400px; margin: 0 auto; }
    .view { display: none; }
    .view.active { display: block; }
    
    /* Header */
    .header { text-align: center; margin-bottom: 20px; padding: 30px; background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; background: rgba(30, 41, 59, 0.6); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
    .search-box { flex: 1; min-width: 200px; }
    .search-box input { width: 100%; padding: 12px; border: 2px solid #334155; border-radius: 10px; background: #000; color: white; outline: none; }
    
    .filter-btn { padding: 8px 12px; border: 1px solid #334155; border-radius: 8px; background: rgba(15, 23, 42, 0.8); color: #94a3b8; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
    .filter-btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }
    
    /* Tier Sections */
    .tier-section { margin-bottom: 25px; background: rgba(30, 41, 59, 0.4); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
    .tier-header { padding: 10px 20px; font-size: 1.2rem; font-weight: 900; }
    .tier-s { background: #ef4444; } .tier-a { background: #f97316; } .tier-b { background: #facc15; color: #000; } .tier-c { background: #22c55e; }
    .tier-content { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    
    /* Hero Card */
    .hero-card { background: #1e293b; border: 1.5px solid #334155; border-radius: 12px; padding: 12px; text-align: center; cursor: pointer; transition: 0.2s; position: relative; }
    .hero-card:hover { transform: translateY(-3px); border-color: #3b82f6; }
    .hero-avatar { width: 65px; height: 65px; margin: 0 auto 8px; border-radius: 50%; border: 3px solid #3b82f6; overflow: hidden; background: #0f172a; }
    .hero-avatar img { width: 100%; height: 100%; object-fit: cover; }
    
    .lane-badge { position: absolute; top: 6px; right: 6px; font-size: 0.55rem; background: #0f172a; padding: 2px 5px; border-radius: 4px; color: #3b82f6; font-weight: 900; border: 1px solid #3b82f6; }
    .hero-flavor-txt { font-size: 0.85rem; font-weight: 800; color: #fff; margin-bottom: 2px; display: block; line-height: 1.1; }
    .hero-name-txt { font-size: 0.7rem; color: #60a5fa; font-weight: bold; text-transform: uppercase; display: block; }

    /* Detail View */
    .detail-card { background: #1e293b; padding: 25px; border-radius: 20px; border: 1px solid #3b82f6; max-width: 700px; margin: 0 auto; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin: 20px 0; }
    .stat-box { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #334155; }
    .stat-val { font-size: 1.2rem; font-weight: 900; color: #4ade80; display: block; }
    
    .counter-section { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 12px; }
    .counter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 10px; }
    .counter-item { background: #0f172a; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #334155; }
    .counter-img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ef4444; margin-bottom: 4px; }
    
    .back-btn { padding: 10px 20px; background: #3b82f6; border: none; color: white; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-weight: 700; }
    @media (max-width: 768px) { .tier-content { grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); } }
  </style>
</head>

        if (filtered.length > 0) {
          const sec = document.createElement('div');
          sec.className = 'tier-section';
          sec.innerHTML = `<div class="tier-header tier-${t.toLowerCase()}">${t}-TIER</div><div class="tier-content"></div>`;
          const content = sec.querySelector('.tier-content');
          content.innerHTML = filtered.map(h => `
            <div class="hero-card" onclick="showView('herodetail', '${h.id}')">
              <div class="lane-badge">${h.lane}</div>
              <div class="hero-avatar">
                <img src="hero_portraits/${encodeURIComponent(h.id)}${h.id==='Chano'||h.id==='Xuance'?'.jpg':'.png'}" onerror="this.src='https://ui-avatars.com/api/?name=%20&background=1e293b&color=60a5fa';">
              </div>
              <span class="hero-flavor-txt">${h.title}</span>
              <span class="hero-name-txt">${h.id}</span>
            </div>
          `).join('');
          root.appendChild(sec);
        }
      });
    }

    function setRole(r, b) {
      activeRole = r;
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      b.classList.add('active');
      renderList();
    }
    function handleSearch() {
      searchQuery = document.getElementById('search-input').value.toLowerCase();
      renderList();
    }
    window.onload = renderList;
  </script>
</body>
</html>
