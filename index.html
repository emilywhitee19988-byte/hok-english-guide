<!DOCTYPE html>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; padding: 15px; line-height: 1.5; }
    .container { max-width: 1400px; margin: 0 auto; }
    .view { display: none; }
    .view.active { display: block; }
    
    /* Header */
    .header { text-align: center; margin-bottom: 20px; padding: 25px; background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; background: rgba(30, 41, 59, 0.6); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
    .search-box { flex: 1; min-width: 200px; }
    .search-box input { width: 100%; padding: 12px; border: 2px solid #334155; border-radius: 10px; background: #000; color: white; outline: none; }
    
    .filter-btn { padding: 8px 12px; border: 1px solid #334155; border-radius: 8px; background: rgba(15, 23, 42, 0.8); color: #94a3b8; cursor: pointer; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }
    .filter-btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }
    
    /* Tier Sections */
    .tier-section { margin-bottom: 25px; background: rgba(30, 41, 59, 0.4); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
    .tier-header { padding: 10px 20px; font-size: 1.1rem; font-weight: 900; letter-spacing: 1px; }
    .tier-s { background: #ef4444; } .tier-a { background: #f97316; } .tier-b { background: #facc15; color: #000; } .tier-c { background: #22c55e; }
    .tier-content { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    
    /* Hero Card */
    .hero-card { background: #1e293b; border: 1.5px solid #334155; border-radius: 12px; padding: 12px; text-align: center; cursor: pointer; transition: 0.2s; position: relative; }
    .hero-card:hover { transform: translateY(-3px); border-color: #3b82f6; }
    .hero-avatar { width: 65px; height: 65px; margin: 0 auto 8px; border-radius: 50%; border: 2px solid #3b82f6; overflow: hidden; background: #0f172a; }
    .hero-avatar img { width: 100%; height: 100%; object-fit: cover; }
    
    .lane-badge { position: absolute; top: 6px; right: 6px; font-size: 0.55rem; background: #0f172a; padding: 2px 5px; border-radius: 4px; color: #3b82f6; font-weight: 900; border: 1px solid #3b82f6; }
    .hero-flavor-txt { font-size: 0.85rem; font-weight: 800; color: #fff; margin-bottom: 2px; display: block; line-height: 1.1; }
    .hero-name-txt { font-size: 0.7rem; color: #60a5fa; font-weight: bold; text-transform: uppercase; display: block; }

    /* Detail View */
    .detail-card { background: #1e293b; padding: 25px; border-radius: 20px; border: 1px solid #3b82f6; max-width: 750px; margin: 0 auto; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .section-title { color: #3b82f6; font-size: 0.9rem; font-weight: 800; margin: 20px 0 10px; border-bottom: 1px solid #334155; padding-bottom: 5px; text-transform: uppercase; }
    .item-slot { background: #0f172a; border: 1px solid #334155; padding: 6px 10px; border-radius: 6px; font-size: 0.75rem; color: #fff; font-weight: bold; display: inline-block; margin: 2px; }
    
    .spriteling-box { background: linear-gradient(135deg, #1e3a8a 0%, #1e1b4b 100%); padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid #3b82f6; }
    .sprite-icon { width: 45px; height: 45px; background: #000; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; border: 2px solid #facc15; }

    .arcana-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .arcana-box { padding: 8px; border-radius: 8px; text-align: center; font-size: 0.7rem; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); }
    .arc-red { background: rgba(239, 68, 68, 0.15); color: #ef4444; border-color: #ef4444; }
    .arc-blue { background: rgba(59, 130, 246, 0.15); color: #3b82f6; border-color: #3b82f6; }
    .arc-green { background: rgba(34, 197, 94, 0.15); color: #22c55e; border-color: #22c55e; }

    .back-btn { padding: 10px 20px; background: #3b82f6; border: none; color: white; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-weight: 700; }
    @media (max-width: 768px) { .tier-content { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); } .arcana-grid { grid-template-columns: 1fr; } }
  </style>
</head>

    const ALL_NAMES = ['Agudo', 'Alessio', 'Allain', 'Angela', 'Arke', 'Arli', 'Arthur', 'Ata', 'Athena', 'Augran', 'Bai Qi', 'Biron', 'Butterfly', 'Cai Yan', 'Cao Cao', 'Chano', 'Charlotte', 'Cirrus', 'Consort Yu', 'Da Qiao', 'Daji', 'Dharma', 'Di Renjie', 'Dian Wei', 'Diaochan', 'Dolia', 'Donghuang', 'Dr Bian', 'Dun', 'Dyadia', 'Erin', 'Fang', 'Feyd', 'Fuzi', 'Gan & Mo', 'Gao', 'Garo', 'Guan Yu', 'Guiguzi', 'Han Xin', 'Haya', 'Heino', 'Hou Yi', 'Huang Zhong', 'Jing', 'Kaizer', 'Kongming', 'Kui', 'Lady Sun', 'Lady Zhen', 'Lam', 'Li Bai', 'Li Xin', 'Lian Po', 'Liang', 'Liu Bang', 'Liu Bei', 'Liu Shan', 'Loong', 'Lu Bu', 'Luara', 'Luban No. 7', 'Luna', 'Mai Shiranui', 'Ma Chao', 'Marco Polo', 'Mayene', 'Meng Ya', 'Menki', 'Mi Yue', 'Milady', 'Ming', 'Mozi', 'Mulan', 'Musashi', 'Nakoruru', 'Nezha', 'Nuwa', 'Pangu', 'Pei', 'Prince of Lanling', 'Princess Frost', 'Shangguan', 'Shi', 'Shouyue', 'Sima Yi', 'Sun Bin', 'Sun Ce', 'Ukyo Tachibana', 'Wukong', 'Wuyan', 'Xiang Yu', 'Xiao Qiao', 'Xuance', 'Yang Jian', 'Yao', 'Yaria', 'Ying', 'Yixing', 'Yuhuan', 'Zhang Fei', 'Zhou Yu', 'Zhuangzi', 'Zilong', 'Ziya'];
    ALL_NAMES.forEach(name => {
      if(!HEROES.find(h => h.id === name)) {
        HEROES.push({ id: name, title: name, role: 'Fighter', tier: 'B', lane: 'CLASH', diff: 3, sprite: 'Bigly', build: ['Core 1', 'Core 2'], arcana: ['Red', 'Blue', 'Green'] });
      }
    });

    let activeRole = 'all';
    let searchQuery = '';

    function showView(v, id = null) {
      document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
      document.getElementById('view-' + v).classList.add('active');
      if (v === 'herodetail' && id) renderDetail(id);
      window.scrollTo(0,0);
    }

    function renderDetail(id) {
      const h = HEROES.find(x => x.id === id);
      const sprite = SPRITE_DATA[h.sprite] || SPRITE_DATA['Bigly'];
      const ext = h.ext || '.png';
      const stars = '★'.repeat(h.diff || 3) + '☆'.repeat(5 - (h.diff || 3));
      
      document.getElementById('detail-root').innerHTML = `
        <div class="detail-card">
          <div style="display:flex; align-items:center; gap:20px; flex-wrap:wrap; margin-bottom:20px;">
            <img src="hero_portraits/${encodeURIComponent(h.id)}${ext}" style="width:110px; height:110px; border-radius:50%; border:3px solid #3b82f6;" onerror="this.src='https://ui-avatars.com/api/?name=${id}&background=1e293b&color=fff';">
            <div>
              <h2 style="font-size:2rem; line-height:1.1;">${h.title}</h2>
              <p style="color:#60a5fa; font-weight:900; font-size:1.2rem;">${h.id.toUpperCase()}</p>
              <div style="margin-top:8px;">
                <span class="lane-badge" style="position:static;">${h.lane}</span>
                <span style="color:#facc15; margin-left:10px;">${stars}</span>
              </div>
            </div>
          </div>
          <div class="section-title">🐾 Best Spriteling</div>
          <div class="spriteling-box">
            <div class="sprite-icon">${sprite.icon}</div>
            <div>
              <div style="font-size:1.1rem; font-weight:900; color:#fff;">${h.sprite}</div>
              <div style="font-size:0.75rem; color:#c7d2fe;">${sprite.desc}</div>
            </div>
          </div>
          <div class="section-title">⚔️ Pro Core Build</div>
          <div style="display:flex; flex-wrap:wrap; gap:5px;">${(h.build || ['Core 1', 'Core 2']).map(i => `<div class="item-slot">${i}</div>`).join('')}</div>
          <div class="section-title">🔮 Best Arcana Set</div>
          <div class="arcana-grid">
            <div class="arcana-box arc-red">RED: ${(h.arcana || ['Set'])[0]}</div>
            <div class="arcana-box arc-blue">BLUE: ${(h.arcana || ['Set'])[1]}</div>
            <div class="arcana-box arc-green">GREEN: ${(h.arcana || ['Set'])[2]}</div>
          </div>
        </div>
      `;
    }

    function renderList() {
      const root = document.getElementById('tier-list-root');
      root.innerHTML = '';
      ['S', 'A', 'B', 'C'].forEach(t => {
        const filtered = HEROES.filter(h => {
          const matchTier = t === h.tier;
          const matchRole = activeRole === 'all' || h.role === activeRole;
          const matchSearch = h.id.toLowerCase().includes(searchQuery) || h.title.toLowerCase().includes(searchQuery);
          return matchTier && matchRole && matchSearch;
        });
        if (filtered.length > 0) {
          const sec = document.createElement('div');
          sec.className = 'tier-section';
          sec.innerHTML = `<div class="tier-header tier-${t.toLowerCase()}">${t}-TIER</div><div class="tier-content"></div>`;
          const content = sec.querySelector('.tier-content');
          content.innerHTML = filtered.map(h => `
            <div class="hero-card" onclick="showView('herodetail', '${h.id}')">
              <div class="lane-badge">${h.lane}</div>
              <div class="hero-avatar">
                <img src="hero_portraits/${encodeURIComponent(h.id)}${h.ext || '.png'}" onerror="this.src='https://ui-avatars.com/api/?name=%20&background=1e293b&color=60a5fa';">
              </div>
              <span class="hero-flavor-txt">${h.title}</span>
              <span class="hero-name-txt">${h.id}</span>
            </div>
          `).join('');
          root.appendChild(sec);
        }
      });
    }

    function setRole(r, b) {
      activeRole = r;
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      b.classList.add('active');
      renderList();
    }
    function handleSearch() {
      searchQuery = document.getElementById('search-input').value.toLowerCase();
      renderList();
    }
    window.onload = renderList;
  </script>
</body>
</html>
