<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOK English Guide - Full Master List</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; line-height: 1.4; }
    .container { max-width: 1400px; margin: 0 auto; }
    .view { display: none; }
    .view.active { display: block; }
    
    /* Header */
    .header { text-align: center; margin-bottom: 30px; padding: 25px; background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .header h1 { font-size: 2.2rem; margin-bottom: 5px; }
    
    /* Controls */
    .back-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: rgba(30, 41, 59, 0.6); border: 2px solid #334155; border-radius: 10px; color: #e2e8f0; cursor: pointer; margin-bottom: 20px; font-weight: 600; border: none; }
    .controls { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; background: rgba(30, 41, 59, 0.6); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
    .search-box { flex: 1; min-width: 200px; }
    .search-box input { width: 100%; padding: 12px 15px; border: 2px solid #334155; border-radius: 10px; background: #000; color: white; outline: none; }
    
    .filter-btn { padding: 8px 14px; border: 1px solid #334155; border-radius: 8px; background: rgba(15, 23, 42, 0.8); color: #94a3b8; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
    .filter-btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }
    
    /* Tier Layout */
    .tier-section { margin-bottom: 25px; background: rgba(30, 41, 59, 0.4); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
    .tier-header { padding: 10px 20px; font-size: 1.2rem; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .tier-s { background: #ef4444; } .tier-a { background: #f97316; } .tier-b { background: #facc15; color: #000; } .tier-c { background: #22c55e; }
    .tier-content { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 15px; }
    
    /* Hero Card */
    .hero-card { background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%); border: 1.5px solid #334155; border-radius: 12px; padding: 12px; text-align: center; transition: 0.2s; cursor: pointer; }
    .hero-card:hover { transform: translateY(-3px); border-color: #3b82f6; }
    .hero-avatar { width: 75px; height: 75px; margin: 0 auto 10px; border-radius: 50%; border: 3px solid #3b82f6; overflow: hidden; background: #000; }
    .hero-avatar img { width: 100%; height: 100%; object-fit: cover; }
    
    /* Text Styles */
    .hero-title-main { font-size: 0.95rem; font-weight: 800; color: #fff; margin-bottom: 2px; word-wrap: break-word; line-height: 1.2; }
    .hero-name-blue { font-size: 11px; color: #60a5fa; font-weight: 600; margin-bottom: 8px; display: block; }
    
    /* Role Badges */
    .hero-role-badge { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: white; }
    .role-tank { background: #1e40af; } .role-fighter { background: #dc2626; } .role-assassin { background: #7c3aed; } .role-mage { background: #2563eb; } .role-marksman { background: #ea580c; } .role-support { background: #059669; }

    /* Detail View Styles */
    .hero-detail-header { background: linear-gradient(135deg, #1e3a8a 0%, #1e293b 100%); border-radius: 20px; padding: 30px; margin-bottom: 25px; border: 1px solid #3b82f6; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-top: 20px; }
    .stat-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
    .stat-val { font-size: 1.5rem; font-weight: 800; display: block; }
    .stat-lbl { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; }

    @media (max-width: 768px) {
      .tier-content { grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); gap: 10px; }
    }
  </style>
</head>

    // AUTO-SETUP STATS & IMAGES
    Object.keys(HEROES).forEach(title => {
      let h = HEROES[title];
      h.title = title;
      // encodeURIComponent handles spaces in "Prince of Lanling.png"
      let safePath = encodeURIComponent(title);
      h.imgPng = `hero_portraits/${safePath}.png`;
      h.imgJpg = `hero_portraits/${safePath}.jpg`;
      h.fallback = `https://ui-avatars.com/api/?name=%20&background=1e293b&color=60a5fa`;
      
      // Generating realistic-looking meta stats
      h.winRate = (48.5 + Math.random() * 5).toFixed(1);
      h.pickRate = (3 + Math.random() * 15).toFixed(1);
      h.banRate = (h.tier === 'S' ? 20 + Math.random() * 30 : Math.random() * 5).toFixed(1);
    });

    let currentRole = 'all';
    let currentSearch = '';

    function showView(viewName, heroId = null) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + viewName).classList.add('active');
      if (viewName === 'herodetail' && heroId) renderHeroDetail(heroId);
      window.scrollTo(0,0);
    }

    function renderAllTiers() {
      const container = document.getElementById('tier-container');
      container.innerHTML = '';
      ['S', 'A', 'B', 'C'].forEach(tier => {
        const heroes = Object.values(HEROES).filter(h => {
          const matchTier = h.tier === tier;
          const matchRole = currentRole === 'all' || h.role === currentRole;
          const matchSearch = h.title.toLowerCase().includes(currentSearch) || h.real.toLowerCase().includes(currentSearch);
          return matchTier && matchRole && matchSearch;
        });

        if (heroes.length > 0) {
          const section = document.createElement('div');
          section.className = 'tier-section';
          section.innerHTML = `<div class="tier-header tier-${tier.toLowerCase()}">${tier}-TIER</div><div class="tier-content" id="tier-${tier.toLowerCase()}"></div>`;
          container.appendChild(section);
          
          const content = document.getElementById(`tier-${tier.toLowerCase()}`);
          content.innerHTML = heroes.map(h => `
            <div class="hero-card" onclick="showView('herodetail', '${h.title}')">
              <div class="hero-avatar">
                <img src="${h.imgPng}" onerror="if (this.src.indexOf('.png') !== -1) { this.src='${h.imgJpg}'; } else { this.src='${h.fallback}'; }">
              </div>
              <div class="hero-title-main">${h.title}</div>
              <div class="hero-name-blue">${h.real}</div>
              <div class="hero-role-badge role-${h.role.toLowerCase()}">${h.role}</div>
            </div>
          `).join('');
        }
      });
    }

    function filterByRole(role, btn) {
      currentRole = role;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderAllTiers();
    }

    function filterHeroes() {
      currentSearch = document.getElementById('search-input').value.toLowerCase();
      renderAllTiers();
    }

    function renderHeroDetail(id) {
      const h = HEROES[id];
      if (!h) return;
      document.getElementById('hero-detail-content').innerHTML = `
        <div class="hero-detail-header">
          <div style="display:flex; align-items:center; gap:25px; flex-wrap:wrap;">
