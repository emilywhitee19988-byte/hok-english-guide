<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOK Tier List - GitHub Version</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; line-height: 1.3; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 30px; padding: 20px; background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); border-radius: 15px; }
    .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; background: rgba(30, 41, 59, 0.6); padding: 15px; border-radius: 12px; }
    .search-box { flex: 1; min-width: 200px; }
    .search-box input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #000; color: #fff; }
    .tier-section { margin-bottom: 20px; background: rgba(30, 41, 59, 0.4); border-radius: 12px; overflow: hidden; border: 1px solid #334155; }
    .tier-header { padding: 8px 15px; font-weight: 900; }
    .tier-s { background: #ef4444; } .tier-a { background: #f97316; } .tier-b { background: #facc15; color: #000; } .tier-c { background: #22c55e; }
    .tier-content { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
    .hero-card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 12px; text-align: center; cursor: pointer; }
    .hero-avatar { width: 65px; height: 65px; margin: 0 auto 8px; border-radius: 50%; border: 2px solid #3b82f6; overflow: hidden; }
    .hero-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .hero-title-main { font-size: 0.9rem; font-weight: 800; color: #fff; margin-bottom: 2px; word-wrap: break-word; }
    .hero-name-blue { font-size: 11px; color: #60a5fa; font-weight: 600; margin-bottom: 8px; display: block; }
    .hero-role { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; background: #0f172a; }
    @media (max-width: 768px) { .tier-content { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><h1>🎮 HOK Tier List</h1><p>GitHub Fixed Version</p></div>
    <div class="controls">
      <div class="search-box"><input type="text" id="search-input" placeholder="Search hero..." oninput="filterHeroes()"></div>
    </div>
    <div id="tier-container"></div>
  </div>

  <script>
    // DATABASE: The keys (e.g. 'Princess Frost') must match your filenames EXACTLY.
    const HEROES = {
      'Princess Frost': { nameReal: 'Wang Zhaojun', role: 'Mage', tier: 'S' },
      'Prince of Lanling': { nameReal: 'Lanling', role: 'Assassin', tier: 'S' },
      'Nakoruru': { nameReal: 'Nakoruru', role: 'Assassin', tier: 'B' },
      'Nezha': { nameReal: 'Nezha', role: 'Fighter', tier: 'C' },
      'Nuwa': { nameReal: 'Nuwa', role: 'Mage', tier: 'B' },
      'Pei': { nameReal: 'Pei', role: 'Assassin', tier: 'B' },
      'Shangguan': { nameReal: 'Shangguan', role: 'Assassin', tier: 'C' },
      'Shi': { nameReal: 'Xi Shi', role: 'Mage', tier: 'B' },
      'Shouyue': { nameReal: 'Baili Shouyue', role: 'Marksman', tier: 'B' },
      'Alessio': { nameReal: 'Alessio', role: 'Marksman', tier: 'C' },
      'Angela': { nameReal: 'Angela', role: 'Mage', tier: 'S' },
      'Cai Yan': { nameReal: 'Cai Yan', role: 'Support', tier: 'S' },
      'Lady Sun': { nameReal: 'Lady Sun', role: 'Marksman', tier: 'B' },
      'Marco Polo': { nameReal: 'Marco Polo', role: 'Marksman', tier: 'S' }
    };

    Object.keys(HEROES).forEach(name => {
      let h = HEROES[name];
      h.title = name;
      // encodeURIComponent fixes the "Spaces" issue on GitHub
      h.imageUrl = `hero_portraits/${encodeURIComponent(name)}.png`;
      h.fallback = `https://ui-avatars.com/api/?name=%20&background=1e293b&color=60a5fa`;
    });

    function renderAllTiers() {
      const container = document.getElementById('tier-container');
      container.innerHTML = '';
      ['S', 'A', 'B', 'C'].forEach(tier => {
        const heroes = Object.values(HEROES).filter(h => h.tier === tier);
        if (heroes.length > 0) {
          const section = document.createElement('div');
          section.className = 'tier-section';
          section.innerHTML = `<div class="tier-header tier-${tier.toLowerCase()}">${tier}-TIER</div><div class="tier-content" id="tier-${tier.toLowerCase()}"></div>`;
          container.appendChild(section);
          const content = document.getElementById(`tier-${tier.toLowerCase()}`);
          content.innerHTML = heroes.map(h => `
            <div class="hero-card">
              <div class="hero-avatar">
                <img src="${h.imageUrl}" onerror="this.src='${h.fallback}';">
              </div>
              <div class="hero-title-main">${h.title}</div>
              <div class="hero-name-blue">${h.nameReal}</div>
              <div class="hero-role">${h.role}</div>
            </div>
          `).join('');
        }
      });
    }

    function filterHeroes() {
      const search = document.getElementById('search-input').value.toLowerCase();
      document.querySelectorAll('.hero-card').forEach(card => {
        const text = card.innerText.toLowerCase();
        card.style.display = text.includes(search) ? 'block' : 'none';
      });
    }

    window.onload = renderAllTiers;
  </script>
</body>
</html>
