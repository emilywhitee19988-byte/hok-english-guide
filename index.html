<!DOCTYPE html>

  <meta charset="UTF-8">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; line-height: 1.5; }
    .container { max-width: 1400px; margin: 0 auto; }
    .view { display: none; }
    .view.active { display: block; }
    
    /* Header */
    .header { text-align: center; margin-bottom: 30px; padding: 30px; background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .controls { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; background: rgba(30, 41, 59, 0.6); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
    .search-box { flex: 1; min-width: 250px; }
    .search-box input { width: 100%; padding: 12px 15px; border: 2px solid #334155; border-radius: 10px; background: #000; color: white; outline: none; }
    
    .filter-btn { padding: 8px 16px; border: 1px solid #334155; border-radius: 8px; background: rgba(15, 23, 42, 0.8); color: #94a3b8; cursor: pointer; font-weight: 600; }
    .filter-btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }
    
    /* Tier Grid */
    .tier-section { margin-bottom: 30px; background: rgba(30, 41, 59, 0.4); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
    .tier-header { padding: 12px 20px; font-size: 1.3rem; font-weight: 900; }
    .tier-s { background: #ef4444; } .tier-a { background: #f97316; } .tier-b { background: #facc15; color: #000; } .tier-c { background: #22c55e; }
    .tier-content { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 15px; }
    
    /* Hero Card */
    .hero-card { background: #1e293b; border: 1.5px solid #334155; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: 0.2s; position: relative; }
    .hero-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
    .hero-avatar { width: 75px; height: 75px; margin: 0 auto 10px; border-radius: 50%; border: 3px solid #3b82f6; overflow: hidden; }
    .hero-avatar img { width: 100%; height: 100%; object-fit: cover; }
    
    /* Badges */
    .lane-badge { position: absolute; top: 8px; right: 8px; font-size: 0.6rem; background: #0f172a; padding: 2px 6px; border-radius: 4px; color: #3b82f6; font-weight: 900; border: 1px solid #3b82f6; }
    .hero-flavor-txt { font-size: 0.9rem; font-weight: 800; color: #fff; margin-bottom: 2px; display: block; line-height: 1.2; }
    .hero-name-txt { font-size: 0.7rem; color: #60a5fa; font-weight: bold; text-transform: uppercase; display: block; }

    /* Detail View */
    .detail-card { background: #1e293b; padding: 35px; border-radius: 25px; border: 1px solid #3b82f6; max-width: 750px; margin: 0 auto; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; margin: 25px 0; }
    .stat-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
    .stat-val { font-size: 1.4rem; font-weight: 900; color: #4ade80; display: block; }
    .diff-stars { color: #facc15; font-size: 1.2rem; letter-spacing: 2px; }

    /* Counter Section */
    .counter-section { margin-top: 30px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 15px; border: 1px solid #334155; }
    .counter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-top: 15px; }
    .counter-item { background: #0f172a; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #334155; }
    .counter-img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #ef4444; margin-bottom: 5px; }
    
    .back-btn { padding: 12px 24px; background: #3b82f6; border: none; color: white; border-radius: 10px; cursor: pointer; margin-bottom: 30px; font-weight: 700; }
    @media (max-width: 768px) { .tier-content { grid-template-columns: repeat(auto-fill, minmax(125px, 1fr)); } }
  </style>
</head>
